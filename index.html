<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Convoy Intercom</title>
<meta name="description" content="Live convoy GPS tracking and push-to-talk voice." />
<meta name="theme-color" content="#0b0e11" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="mobile-web-app-capable" content="yes" />
<link id="manifest-link" rel="manifest" href="" />

<!-- Leaflet (map) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<!-- Supabase JS v2 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<style>
/* ============================================================
   DESIGN TOKENS — "Night Convoy" theme
   Asphalt-dark base, amber beacon accent (CB/hazard signaling),
   teal GPS-lock accent, monospace telemetry for data readouts.
   ============================================================ */
:root{
  --bg:#0b0e11;
  --bg-elev:#12161d;
  --bg-elev-2:#181d26;
  --line:#232936;
  --text:#e8ecf1;
  --muted:#8a94a6;
  --accent:#ff9f1c;        /* beacon amber */
  --accent-dim:#8a5a12;
  --accent-2:#2dd4bf;      /* GPS-lock teal */
  --danger:#ff5470;
  --online:#2dd4bf;
  --offline:#5b6472;
  --radius:14px;
  --radius-sm:8px;
  --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", "Roboto Mono", "Courier New", monospace;
  --shadow: 0 8px 24px rgba(0,0,0,.35);
}
html[data-theme="light"]{
  --bg:#eef1f5;
  --bg-elev:#ffffff;
  --bg-elev-2:#f4f6f9;
  --line:#dde3ec;
  --text:#151a21;
  --muted:#5b6472;
  --accent:#e07d00;
  --accent-dim:#f0c078;
  --accent-2:#0d9488;
  --danger:#d1223f;
  --online:#0d9488;
  --offline:#9aa4b2;
  --shadow: 0 8px 24px rgba(20,30,45,.12);
}

*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-ui);
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}
button, input{ font-family:inherit; }
button{ cursor:pointer; }
:focus-visible{ outline:2px solid var(--accent-2); outline-offset:2px; }

.hidden{ display:none !important; }

/* ---------- Screens ---------- */
.screen{
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
  padding:24px;
  background:
    radial-gradient(circle at 20% 15%, rgba(255,159,28,.08), transparent 40%),
    radial-gradient(circle at 80% 85%, rgba(45,212,191,.07), transparent 45%),
    var(--bg);
}
.card{
  width:100%; max-width:420px;
  background:var(--bg-elev);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:28px 26px 26px;
}
.brand{
  display:flex; align-items:center; gap:10px; margin-bottom:22px;
}
.brand-mark{
  width:34px; height:34px; border-radius:9px;
  background:conic-gradient(from 180deg, var(--accent), var(--accent-dim), var(--accent));
  position:relative; flex:none;
}
.brand-mark::after{
  content:""; position:absolute; inset:9px; border-radius:50%;
  background:var(--bg-elev);
}
.brand-title{ font-size:17px; font-weight:700; letter-spacing:.2px; }
.brand-sub{ font-size:12px; color:var(--muted); font-family:var(--font-mono); }

.tabs{ display:flex; gap:4px; background:var(--bg-elev-2); border:1px solid var(--line); border-radius:var(--radius-sm); padding:4px; margin-bottom:18px; }
.tab-btn{
  flex:1; border:none; background:transparent; color:var(--muted);
  padding:9px 0; border-radius:6px; font-size:13px; font-weight:600; letter-spacing:.2px;
  transition:background .15s, color .15s;
}
.tab-btn.active{ background:var(--accent); color:#1a1200; }

.field{ margin-bottom:14px; }
.field label{ display:block; font-size:12px; color:var(--muted); margin-bottom:6px; font-weight:600; letter-spacing:.3px; text-transform:uppercase; }
.field input{
  width:100%; padding:11px 13px; background:var(--bg-elev-2); border:1px solid var(--line);
  border-radius:var(--radius-sm); color:var(--text); font-size:14px;
}
.field input:focus{ border-color:var(--accent-2); }

.btn{
  width:100%; padding:12px 14px; border-radius:var(--radius-sm); border:none;
  font-size:14px; font-weight:700; letter-spacing:.2px; transition:transform .1s, filter .15s;
}
.btn:active{ transform:scale(.98); }
.btn-primary{ background:var(--accent); color:#1a1200; }
.btn-primary:hover{ filter:brightness(1.08); }
.btn-ghost{ background:transparent; color:var(--text); border:1px solid var(--line); }
.btn-ghost:hover{ border-color:var(--accent-2); }
.btn-danger{ background:transparent; color:var(--danger); border:1px solid var(--danger); }
.btn-row{ display:flex; gap:10px; }

.msg{ font-size:13px; margin-top:12px; padding:10px 12px; border-radius:var(--radius-sm); display:none; }
.msg.show{ display:block; }
.msg.error{ background:rgba(255,84,112,.12); color:var(--danger); border:1px solid rgba(255,84,112,.3); }
.msg.info{ background:rgba(45,212,191,.1); color:var(--accent-2); border:1px solid rgba(45,212,191,.28); }

.divider-or{ display:flex; align-items:center; gap:10px; margin:18px 0; color:var(--muted); font-size:12px; }
.divider-or::before, .divider-or::after{ content:""; flex:1; height:1px; background:var(--line); }

.code-display{
  font-family:var(--font-mono); font-size:26px; letter-spacing:6px; text-align:center;
  padding:14px; background:var(--bg-elev-2); border:1px dashed var(--line); border-radius:var(--radius-sm);
  margin:6px 0 16px; user-select:all;
}
.link-btn{ background:none; border:none; color:var(--accent-2); font-size:13px; padding:0; text-decoration:underline; }

/* ---------- App screen ---------- */
#app-screen{ position:fixed; inset:0; display:block; padding:0; background:var(--bg); }
#map{ position:absolute; inset:0; z-index:1; background:#0a0c0f; }

.topbar{
  position:absolute; top:0; left:0; right:0; z-index:500;
  display:flex; align-items:center; gap:10px;
  padding:calc(env(safe-area-inset-top,0px) + 10px) 12px 10px;
  background:linear-gradient(to bottom, rgba(11,14,17,.92), rgba(11,14,17,0));
  pointer-events:none;
}
.topbar > *{ pointer-events:auto; }
.topbar-info{
  display:flex; align-items:center; gap:8px;
  background:var(--bg-elev); border:1px solid var(--line); border-radius:999px;
  padding:6px 14px 6px 6px; box-shadow:var(--shadow);
}
.topbar-info .beacon-dot{
  width:9px; height:9px; border-radius:50%; background:var(--online);
  box-shadow:0 0 0 3px rgba(45,212,191,.2);
}
.topbar-info .beacon-dot.offline{ background:var(--offline); box-shadow:none; }
.topbar-title{ font-size:13px; font-weight:700; }
.topbar-code{ font-family:var(--font-mono); font-size:11px; color:var(--muted); }
.icon-btn{
  width:38px; height:38px; border-radius:50%; border:1px solid var(--line);
  background:var(--bg-elev); color:var(--text); display:flex; align-items:center; justify-content:center;
  font-size:16px; box-shadow:var(--shadow); flex:none;
}
.spacer{ flex:1; }

.banner{
  position:absolute; top:calc(env(safe-area-inset-top,0px) + 62px); left:12px; right:12px; z-index:490;
  background:rgba(255,84,112,.14); border:1px solid rgba(255,84,112,.35); color:#ffb3c1;
  padding:9px 14px; border-radius:var(--radius-sm); font-size:12.5px; text-align:center;
  backdrop-filter: blur(6px);
}
.banner.info{ background:rgba(45,212,191,.12); border-color:rgba(45,212,191,.3); color:#a9f2e8; }

/* Talking-now strip */
#talking-strip{
  position:absolute; left:12px; right:12px; z-index:480;
  bottom:calc(env(safe-area-inset-bottom,0px) + 128px);
  display:flex; gap:8px; flex-wrap:wrap; justify-content:center;
  pointer-events:none;
}
.talk-chip{
  background:var(--bg-elev); border:1px solid var(--accent); color:var(--accent);
  padding:6px 12px; border-radius:999px; font-size:12px; font-weight:700;
  display:flex; align-items:center; gap:6px; box-shadow:var(--shadow);
  animation: chipPulse 1.1s ease-in-out infinite;
}
@keyframes chipPulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(255,159,28,.35);} 50%{ box-shadow:0 0 0 6px rgba(255,159,28,0);} }

/* Drawer (member roster) */
#drawer-backdrop{
  position:absolute; inset:0; z-index:600; background:rgba(0,0,0,.45); opacity:0; pointer-events:none;
  transition:opacity .2s;
}
#drawer-backdrop.open{ opacity:1; pointer-events:auto; }
#drawer{
  position:absolute; top:0; right:0; bottom:0; z-index:610;
  width:min(340px, 88vw);
  background:var(--bg-elev); border-left:1px solid var(--line);
  transform:translateX(100%); transition:transform .25s ease;
  display:flex; flex-direction:column;
  padding-top:env(safe-area-inset-top,0px);
}
#drawer.open{ transform:translateX(0); }
.drawer-head{ padding:16px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; }
.drawer-head h2{ font-size:15px; margin:0; }
.member-list{ flex:1; overflow-y:auto; padding:8px; }
.member-card{
  display:flex; gap:10px; align-items:flex-start;
  padding:12px 10px; border-radius:var(--radius-sm); margin-bottom:6px;
  border:1px solid transparent;
  transition:background .12s, border-color .12s;
}
.member-card.locatable{ cursor:pointer; }
.member-card.locatable:hover{ background:var(--bg-elev-2); }
.member-card.locatable:active{ transform:scale(.99); }
.member-card.talking{ border-color:var(--accent); background:rgba(255,159,28,.06); }
.member-locate{ flex:none; align-self:center; opacity:.55; font-size:13px; }
.member-chan{
  font-family:var(--font-mono); font-size:11px; font-weight:700; color:#1a1200;
  background:var(--chan-color, var(--accent-2)); width:38px; height:22px; border-radius:5px;
  display:flex; align-items:center; justify-content:center; flex:none; margin-top:1px;
}
.member-main{ flex:1; min-width:0; }
.member-name-row{ display:flex; align-items:center; gap:6px; }
.member-name{ font-size:13.5px; font-weight:700; }
.member-name.me{ color:var(--accent-2); }
.status-dot{ width:7px; height:7px; border-radius:50%; background:var(--online); flex:none; }
.status-dot.offline{ background:var(--offline); }
.member-tag{ font-size:10px; color:var(--muted); font-family:var(--font-mono); }
.member-stats{
  display:flex; gap:12px; margin-top:4px; font-family:var(--font-mono); font-size:11.5px; color:var(--muted);
}
.member-stats b{ color:var(--text); font-weight:600; }
.member-updated{ font-size:10.5px; color:var(--muted); margin-top:3px; }
.member-empty{ padding:30px 16px; text-align:center; color:var(--muted); font-size:13px; }

.drawer-foot{ padding:12px; border-top:1px solid var(--line); display:flex; flex-direction:column; gap:8px; }

/* Map controls */
.map-fab{
  position:absolute; z-index:470;
  width:42px; height:42px; border-radius:50%;
  background:var(--bg-elev); border:1px solid var(--line); box-shadow:var(--shadow);
  display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--text);
}
#recenter-btn{ right:12px; bottom:calc(env(safe-area-inset-bottom,0px) + 128px); }

/* PTT Beacon Button — signature element */
#ptt-wrap{
  position:absolute; left:0; right:0; bottom:calc(env(safe-area-inset-bottom,0px) + 20px);
  display:flex; flex-direction:column; align-items:center; gap:8px; z-index:475;
}
#ptt-hint{ font-size:11px; color:var(--muted); font-family:var(--font-mono); letter-spacing:.5px; }
#ptt-btn{
  width:88px; height:88px; border-radius:50%; border:none; position:relative;
  background:
    radial-gradient(circle at 35% 30%, #232936, var(--bg-elev) 70%);
  box-shadow: var(--shadow), inset 0 0 0 2px var(--line);
  display:flex; align-items:center; justify-content:center;
  user-select:none; -webkit-user-select:none; touch-action:none;
}
#ptt-btn::before{
  content:""; position:absolute; inset:-6px; border-radius:50%;
  background:conic-gradient(from 0deg, var(--accent), transparent 40%, transparent 60%, var(--accent));
  opacity:.55; animation: beaconSweep 3.2s linear infinite;
}
#ptt-btn::after{
  content:""; position:absolute; inset:4px; border-radius:50%; background:var(--bg-elev);
}
#ptt-btn .ptt-core{
  position:relative; z-index:2; font-size:26px; color:var(--accent);
}
@keyframes beaconSweep{ from{ transform:rotate(0deg);} to{ transform:rotate(360deg);} }
#ptt-btn.active{
  background:radial-gradient(circle at 35% 30%, #3a2200, var(--bg-elev) 70%);
}
#ptt-btn.active::before{ animation:none; opacity:1; background:var(--accent); filter:blur(1px); }
#ptt-btn.active .ptt-core{ color:#fff2df; }
#ptt-btn.active{ box-shadow:0 0 0 10px rgba(255,159,28,.16), var(--shadow); }
#ptt-btn.disabled{ opacity:.4; pointer-events:none; }

/* Leaflet marker styling */
.marker-wrap{ display:flex; flex-direction:column; align-items:center; pointer-events:none; }
/* Fixed-size box so the true GPS point always lands on its exact
   center, regardless of whether we're rendering a heading arrow
   (22px) or a plain dot (16px) inside it — this is what the
   iconAnchor below is measured against. */
.marker-icon-box{ width:24px; height:24px; display:flex; align-items:center; justify-content:center; }
.marker-arrow{
  width:22px; height:22px; clip-path: polygon(50% 0%, 85% 90%, 50% 68%, 15% 90%);
  box-shadow:0 0 0 2px rgba(0,0,0,.35);
}
.marker-wrap.no-heading .marker-arrow{ clip-path:none; border-radius:50%; width:14px; height:14px; }
.marker-wrap.marker-offline .marker-arrow{ background:var(--offline) !important; opacity:.6; }
.marker-wrap.marker-talking .marker-arrow{ box-shadow:0 0 0 5px rgba(255,159,28,.45); }
.marker-label{
  margin-top:3px; font-size:10.5px; font-weight:700; padding:2px 6px; border-radius:5px;
  background:rgba(11,14,17,.85); color:#fff; white-space:nowrap; font-family:var(--font-mono);
}
.leaflet-popup-content-wrapper{ background:var(--bg-elev); color:var(--text); border-radius:10px; }
.leaflet-popup-tip{ background:var(--bg-elev); }
.popup-name{ font-weight:700; margin-bottom:4px; }
.popup-row{ font-family:var(--font-mono); font-size:11.5px; color:var(--muted); }

/* Toasts */
#toast-stack{
  position:absolute; left:12px; bottom:calc(env(safe-area-inset-bottom,0px) + 220px); z-index:900;
  display:flex; flex-direction:column; gap:8px; max-width:280px;
}
.toast{
  background:var(--bg-elev); border:1px solid var(--line); border-left:3px solid var(--accent-2);
  padding:10px 12px; border-radius:8px; font-size:12.5px; box-shadow:var(--shadow);
  animation: toastIn .2s ease;
}
.toast.error{ border-left-color:var(--danger); }
@keyframes toastIn{ from{ opacity:0; transform:translateY(6px);} to{ opacity:1; transform:none;} }

@media (min-width: 720px){
  #ptt-btn{ width:100px; height:100px; }
  #drawer{ width:340px; }
}
</style>
</head>
<body>

<!-- ============================================================
     SCREEN 1 — AUTH (Sign up / Login)
     ============================================================ -->
<div id="auth-screen" class="screen">
  <div class="card">
    <div class="brand">
      <div class="brand-mark"></div>
      <div>
        <div class="brand-title">Convoy Intercom</div>
        <div class="brand-sub">LIVE POSITION · PUSH-TO-TALK</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-auth-tab="login">Log in</button>
      <button class="tab-btn" data-auth-tab="signup">Sign up</button>
    </div>

    <form id="login-form">
      <div class="field">
        <label for="login-email">Email</label>
        <input id="login-email" type="email" autocomplete="email" required />
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <input id="login-password" type="password" autocomplete="current-password" required minlength="6" />
      </div>
      <button class="btn btn-primary" type="submit">Log in</button>
    </form>

    <form id="signup-form" class="hidden">
      <div class="field">
        <label for="signup-name">Display name</label>
        <input id="signup-name" type="text" autocomplete="name" required maxlength="30" placeholder="What convoy members will see" />
      </div>
      <div class="field">
        <label for="signup-email">Email</label>
        <input id="signup-email" type="email" autocomplete="email" required />
      </div>
      <div class="field">
        <label for="signup-password">Password</label>
        <input id="signup-password" type="password" autocomplete="new-password" required minlength="6" placeholder="At least 6 characters" />
      </div>
      <button class="btn btn-primary" type="submit">Create account</button>
    </form>

    <div id="auth-msg" class="msg"></div>
  </div>
</div>

<!-- ============================================================
     SCREEN 2 — CONVOY (Create / Join)
     ============================================================ -->
<div id="convoy-screen" class="screen hidden">
  <div class="card">
    <div class="brand">
      <div class="brand-mark"></div>
      <div>
        <div class="brand-title" id="welcome-name">Welcome</div>
        <div class="brand-sub">CREATE OR JOIN A CONVOY</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-convoy-tab="join">Join</button>
      <button class="tab-btn" data-convoy-tab="create">Create</button>
    </div>

    <form id="join-form">
      <div class="field">
        <label for="join-code">Convoy code</label>
        <input id="join-code" type="text" maxlength="6" placeholder="e.g. 7XQ2KP" required
          style="text-transform:uppercase; letter-spacing:3px; font-family:var(--font-mono); font-size:18px; text-align:center;" />
      </div>
      <button class="btn btn-primary" type="submit">Join convoy</button>
    </form>

    <form id="create-form" class="hidden">
      <div class="field">
        <label for="create-name">Convoy name</label>
        <input id="create-name" type="text" maxlength="40" placeholder="e.g. Coastal Run" required />
      </div>
      <button class="btn btn-primary" type="submit">Create convoy</button>
    </form>

    <div id="convoy-msg" class="msg"></div>

    <div class="divider-or">or</div>
    <button id="signout-btn" class="btn btn-ghost" type="button">Sign out</button>
  </div>
</div>

<!-- ============================================================
     SCREEN 3 — APP (Map + PTT + Roster)
     ============================================================ -->
<div id="app-screen" class="screen hidden">
  <div id="map"></div>

  <div class="topbar">
    <div class="topbar-info">
      <span id="conn-dot" class="beacon-dot"></span>
      <div>
        <div class="topbar-title" id="app-convoy-name">Convoy</div>
        <div class="topbar-code" id="app-convoy-code">CODE ------</div>
      </div>
    </div>
    <div class="spacer"></div>
    <button id="install-btn" class="icon-btn hidden" title="Install app">⬇</button>
    <button id="theme-btn" class="icon-btn" title="Toggle dark/light">◐</button>
    <button id="roster-btn" class="icon-btn" title="Members">☰</button>
  </div>

  <div id="gps-banner" class="banner hidden"></div>

  <div id="talking-strip"></div>

  <button id="recenter-btn" class="map-fab" title="Center on me">◎</button>

  <div id="ptt-wrap">
    <div id="ptt-hint">HOLD TO TALK</div>
    <button id="ptt-btn" type="button" aria-label="Push to talk">
      <span class="ptt-core">🎙</span>
    </button>
  </div>

  <div id="toast-stack"></div>

  <div id="drawer-backdrop"></div>
  <div id="drawer">
    <div class="drawer-head">
      <h2>Convoy roster</h2>
      <button id="drawer-close" class="icon-btn" style="width:32px;height:32px;font-size:14px;">✕</button>
    </div>
    <div id="member-list" class="member-list"></div>
    <div class="drawer-foot">
      <button id="copy-code-btn" class="btn btn-ghost" type="button">Copy convoy code</button>
      <button id="leave-btn" class="btn btn-danger" type="button">Leave convoy</button>
    </div>
  </div>
</div>

<script>
'use strict';

/* ============================================================
   1. CONFIGURATION
   ------------------------------------------------------------
   >>> PASTE YOUR SUPABASE CREDENTIALS HERE <<<
   Get these from: Supabase Dashboard -> Project Settings -> API
   ============================================================ */
const SUPABASE_URL = 'httpseyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpiZ3VzaXBveHliZnp6Zmdpa2ZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxNTM5MjEsImV4cCI6MjA5ODcyOTkyMX0.Buo0xZh9uCMjQxlJpGDI31cak5YD6QGyMUt_DrJqe3Ug.supabase.co';         // e.g. 'https://xxxxxxxxxxxx.supabase.co'
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY'; // the "anon public" key

/* ============================================================
   1b. UI WIRING THAT MUST NEVER DEPEND ON SUPABASE
   ------------------------------------------------------------
   Tab switching and dark-mode toggling are pure UI and must keep
   working even if Supabase fails to initialize below (e.g. the
   credentials above are still placeholders). Wiring these up
   first, before anything that can throw, guarantees the Sign up
   / Log in tabs are always clickable.
   ============================================================ */
function $(sel){ return document.querySelector(sel); }
function $all(sel){ return Array.from(document.querySelectorAll(sel)); }

$all('[data-auth-tab]').forEach(btn => btn.addEventListener('click', () => {
  $all('[data-auth-tab]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const tab = btn.dataset.authTab;
  $('#login-form').classList.toggle('hidden', tab !== 'login');
  $('#signup-form').classList.toggle('hidden', tab !== 'signup');
  const msg = $('#auth-msg');
  if (!msg.dataset.persist) { msg.textContent = ''; msg.classList.remove('show'); }
}));

$all('[data-convoy-tab]').forEach(btn => btn.addEventListener('click', () => {
  $all('[data-convoy-tab]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const tab = btn.dataset.convoyTab;
  $('#join-form').classList.toggle('hidden', tab !== 'join');
  $('#create-form').classList.toggle('hidden', tab !== 'create');
  const msg = $('#convoy-msg');
  msg.textContent = ''; msg.classList.remove('show');
}));

/* ============================================================
   2. SUPABASE CLIENT
   ------------------------------------------------------------
   Wrapped in try/catch: an invalid or still-placeholder URL/key
   throws synchronously inside createClient(), which — if left
   unguarded — would halt the entire script and silently break
   every button below it. If this fails, supabaseClient stays
   null and every Supabase-dependent action shows a clear error
   instead of the page appearing "stuck".
   ============================================================ */
let supabaseClient = null;
let supabaseInitError = null;
try {
  const credentialsArePlaceholders =
    SUPABASE_URL.includes('YOUR_SUPABASE_URL') || SUPABASE_ANON_KEY.includes('YOUR_SUPABASE_ANON_KEY');
  if (credentialsArePlaceholders) {
    throw new Error('Supabase credentials have not been set yet.');
  }
  supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      storage: window.localStorage,
      storageKey: 'convoy-intercom-auth'
    }
  });
} catch (err) {
  supabaseInitError = err.message || String(err);
  console.error('Supabase failed to initialize:', err);
}

function requireSupabase(msgElId){
  if (supabaseClient) return true;
  setFormMsg(msgElId, 'Setup needed: open index.html and paste your real Supabase URL and anon key at the top of the <script> section (see SETUP_INSTRUCTIONS.md).', 'error');
  return false;
}

/* ============================================================
   4. UTILITIES
   ============================================================ */
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function genConvoyCode(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no ambiguous chars (0,O,1,I)
  let out = '';
  for (let i = 0; i < 6; i++) out += chars[Math.floor(Math.random() * chars.length)];
  return out;
}

function haversineMeters(lat1, lon1, lat2, lon2){
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function bearingDegrees(lat1, lon1, lat2, lon2){
  const toRad = d => d * Math.PI / 180;
  const toDeg = r => r * 180 / Math.PI;
  const y = Math.sin(toRad(lon2 - lon1)) * Math.cos(toRad(lat2));
  const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
            Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(toRad(lon2 - lon1));
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

function formatDistance(meters){
  if (meters == null || isNaN(meters)) return '—';
  if (meters < 1000) return `${Math.round(meters)} m`;
  return `${(meters/1000).toFixed(1)} km`;
}

function formatSpeed(mps){
  if (mps == null || isNaN(mps) || mps < 0) return '—';
  return `${Math.round(mps * 3.6)} km/h`;
}

function formatRelativeTime(iso){
  if (!iso) return '—';
  const diff = Math.max(0, Date.now() - new Date(iso).getTime());
  const s = Math.floor(diff/1000);
  if (s < 5) return 'just now';
  if (s < 60) return `${s}s ago`;
  const m = Math.floor(s/60);
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m/60);
  return `${h}h ago`;
}

function colorForUser(userId){
  let hash = 0;
  for (let i = 0; i < userId.length; i++) hash = userId.charCodeAt(i) + ((hash << 5) - hash);
  const hue = Math.abs(hash) % 360;
  return `hsl(${hue}, 78%, 58%)`;
}

function channelNoForUser(userId){
  const m = state.members.get(userId);
  if (m && m.channel_no) return m.channel_no;
  return '--';
}

function showToast(message, type){
  const stack = $('#toast-stack');
  const el = document.createElement('div');
  el.className = 'toast' + (type === 'error' ? ' error' : '');
  el.textContent = message;
  stack.appendChild(el);
  setTimeout(() => { el.remove(); }, 4500);
}

function showScreen(name){
  $('#auth-screen').classList.toggle('hidden', name !== 'auth');
  $('#convoy-screen').classList.toggle('hidden', name !== 'convoy');
  $('#app-screen').classList.toggle('hidden', name !== 'app');
}

function setFormMsg(elId, text, type){
  const el = $(elId);
  el.textContent = text;
  el.className = 'msg show ' + (type || 'error');
  if (!text) el.classList.remove('show');
}

/* ============================================================
   5. AUTH
   ------------------------------------------------------------
   Note: the Sign up / Log in tab-switch listeners are wired up
   earlier in section 1b, before Supabase initialization, so they
   keep working even if Supabase isn't configured yet.
   ============================================================ */
$('#login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  if (!requireSupabase('#auth-msg')) return;
  setFormMsg('#auth-msg', '');
  const email = $('#login-email').value.trim();
  const password = $('#login-password').value;
  const submitBtn = e.target.querySelector('button[type=submit]');
  submitBtn.disabled = true;
  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
  submitBtn.disabled = false;
  if (error) { setFormMsg('#auth-msg', error.message, 'error'); return; }
  await ensureProfile(data.user);
  await afterAuthSuccess();
});

$('#signup-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  if (!requireSupabase('#auth-msg')) return;
  setFormMsg('#auth-msg', '');
  const displayName = $('#signup-name').value.trim();
  const email = $('#signup-email').value.trim();
  const password = $('#signup-password').value;
  const submitBtn = e.target.querySelector('button[type=submit]');
  submitBtn.disabled = true;
  const { data, error } = await supabaseClient.auth.signUp({
    email, password, options: { data: { display_name: displayName } }
  });
  submitBtn.disabled = false;
  if (error) { setFormMsg('#auth-msg', error.message, 'error'); return; }

  if (data.session) {
    await ensureProfile(data.user, displayName);
    await afterAuthSuccess();
  } else {
    setFormMsg('#auth-msg', 'Account created. Check your email to confirm, then log in.', 'info');
    $('[data-auth-tab="login"]').click();
  }
});

$('#signout-btn').addEventListener('click', async () => {
  if (!supabaseClient) { location.reload(); return; }
  await supabaseClient.auth.signOut();
  location.reload();
});

async function ensureProfile(user, displayNameHint){
  const displayName = displayNameHint || user.user_metadata?.display_name || (user.email ? user.email.split('@')[0] : 'Driver');
  const { error } = await supabaseClient
    .from('profiles')
    .upsert({ id: user.id, display_name: displayName }, { onConflict: 'id' });
  if (error) console.error('profile upsert failed', error);
}

async function afterAuthSuccess(){
  const { data: { session } } = await supabaseClient.auth.getSession();
  state.session = session;
  state.user = session.user;

  const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', state.user.id).maybeSingle();
  state.profile = profile || { id: state.user.id, display_name: state.user.email.split('@')[0] };

  $('#welcome-name').textContent = `Hi, ${state.profile.display_name}`;

  // Try to resume a previously joined convoy
  const savedConvoyId = localStorage.getItem('convoy_intercom_convoy_id');
  if (savedConvoyId) {
    const { data: membership } = await supabaseClient
      .from('convoy_members').select('convoy_id').eq('convoy_id', savedConvoyId).eq('user_id', state.user.id).maybeSingle();
    if (membership) {
      const { data: convoy } = await supabaseClient.from('convoys').select('*').eq('id', savedConvoyId).maybeSingle();
      if (convoy) { await enterConvoy(convoy); return; }
    }
    localStorage.removeItem('convoy_intercom_convoy_id');
  }
  showScreen('convoy');
}

if (supabaseClient) {
  supabaseClient.auth.onAuthStateChange((event) => {
    if (event === 'SIGNED_OUT') showScreen('auth');
  });
}

/* ============================================================
   6. CONVOY — create / join / leave
   ------------------------------------------------------------
   Note: the Join / Create tab-switch listeners are wired up
   earlier in section 1b, before Supabase initialization.
   ============================================================ */
$('#create-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  if (!requireSupabase('#convoy-msg')) return;
  primePermissions(); // ask for location + mic immediately, tied to this tap
  setFormMsg('#convoy-msg', '');
  const name = $('#create-name').value.trim();
  const submitBtn = e.target.querySelector('button[type=submit]');
  submitBtn.disabled = true;
  try {
    let convoy = null;
    for (let attempt = 0; attempt < 5 && !convoy; attempt++) {
      const code = genConvoyCode();
      const { data, error } = await supabaseClient
        .from('convoys').insert({ code, name, created_by: state.user.id }).select().single();
      if (!error) { convoy = data; break; }
      if (error.code !== '23505') throw error; // not a unique-violation, rethrow
    }
    if (!convoy) throw new Error('Could not generate a unique convoy code, please try again.');

    const { error: memberErr } = await supabaseClient.from('convoy_members').insert({
      convoy_id: convoy.id, user_id: state.user.id, display_name: state.profile.display_name, role: 'owner'
    });
    if (memberErr) throw memberErr;

    await enterConvoy(convoy);
  } catch (err) {
    setFormMsg('#convoy-msg', err.message || 'Failed to create convoy.', 'error');
    cancelPrimedPermissionsIfNoConvoy();
  } finally {
    submitBtn.disabled = false;
  }
});

$('#join-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  if (!requireSupabase('#convoy-msg')) return;
  primePermissions(); // ask for location + mic immediately, tied to this tap
  setFormMsg('#convoy-msg', '');
  const code = $('#join-code').value.trim().toUpperCase();
  const submitBtn = e.target.querySelector('button[type=submit]');
  submitBtn.disabled = true;
  try {
    const { data: convoy, error } = await supabaseClient.from('convoys').select('*').eq('code', code).maybeSingle();
    if (error) throw error;
    if (!convoy) throw new Error('No convoy found with that code.');

    const { data: existing } = await supabaseClient
      .from('convoy_members').select('id').eq('convoy_id', convoy.id).eq('user_id', state.user.id).maybeSingle();

    if (!existing) {
      const { error: memberErr } = await supabaseClient.from('convoy_members').insert({
        convoy_id: convoy.id, user_id: state.user.id, display_name: state.profile.display_name, role: 'member'
      });
      if (memberErr) throw memberErr;
    }

    await enterConvoy(convoy);
  } catch (err) {
    setFormMsg('#convoy-msg', err.message || 'Failed to join convoy.', 'error');
    cancelPrimedPermissionsIfNoConvoy();
  } finally {
    submitBtn.disabled = false;
  }
});

async function enterConvoy(convoy){
  state.convoy = convoy;
  localStorage.setItem('convoy_intercom_convoy_id', convoy.id);

  $('#app-convoy-name').textContent = convoy.name;
  $('#app-convoy-code').textContent = `CODE ${convoy.code}`;
  showScreen('app');

  if (!state.map) initMap();

  await loadInitialMembersAndLocations();
  subscribeRealtime();
  startHeartbeat();
  startTicker();
  startHealthCheck();
  requestGeolocationAndStart();
  ensureMicAccess(); // proactive — kept muted until PTT is pressed
}

async function loadInitialMembersAndLocations(){
  const { data: members } = await supabaseClient
    .from('convoy_members').select('*').eq('convoy_id', state.convoy.id);
  state.members.clear();
  state.channelNoCounter = 0;
  (members || []).sort((a,b) => new Date(a.joined_at) - new Date(b.joined_at)).forEach(m => {
    state.channelNoCounter++;
    state.members.set(m.user_id, {
      display_name: m.display_name, role: m.role, online: false,
      last_seen: m.last_seen, channel_no: state.channelNoCounter
    });
  });

  const { data: locs } = await supabaseClient
    .from('locations').select('*').eq('convoy_id', state.convoy.id);
  (locs || []).forEach(l => {
    state.locations.set(l.user_id, {
      lat: l.lat, lng: l.lng, heading: l.heading, speed: l.speed, accuracy: l.accuracy, updated_at: l.updated_at
    });
    upsertMemberMarker(l.user_id, state.locations.get(l.user_id));
  });

  renderMemberList();
}

async function leaveConvoy(){
  if (!confirm('Leave this convoy? You will need the code to rejoin.')) return;
  try {
    stopTalking();
    closeAllPeers();
    stopLocationTracking();
    stopHeartbeat();
    stopTicker();
    stopHealthCheck();
    if (state.channel) { await supabaseClient.removeChannel(state.channel); state.channel = null; }

    await supabaseClient.from('locations').delete().eq('convoy_id', state.convoy.id).eq('user_id', state.user.id);
    await supabaseClient.from('convoy_members').delete().eq('convoy_id', state.convoy.id).eq('user_id', state.user.id);

    clearMapMarkers();
    state.members.clear();
    state.locations.clear();
    state.convoy = null;
    localStorage.removeItem('convoy_intercom_convoy_id');
    closeDrawer();
    showScreen('convoy');
  } catch (err) {
    showToast(err.message || 'Failed to leave convoy.', 'error');
  }
}
$('#leave-btn').addEventListener('click', leaveConvoy);

$('#copy-code-btn').addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(state.convoy.code);
    showToast('Convoy code copied.');
  } catch {
    showToast(`Convoy code: ${state.convoy.code}`);
  }
});

/* ============================================================
   7. REALTIME — presence, location broadcast, talking, signaling
   ============================================================ */
function subscribeRealtime(){
  const channel = supabaseClient.channel('convoy:' + state.convoy.id, {
    config: { presence: { key: state.user.id }, broadcast: { self: false } }
  });

  channel.on('presence', { event: 'sync' }, handlePresenceSync);
  channel.on('presence', { event: 'join' }, ({ key }) => { markOnline(key, true); });
  channel.on('presence', { event: 'leave' }, ({ key }) => { markOnline(key, false); });

  channel.on('broadcast', { event: 'location' }, ({ payload }) => handleLocationUpdate(payload, true));
  channel.on('broadcast', { event: 'talking' }, ({ payload }) => handleTalkingUpdate(payload));
  channel.on('broadcast', { event: 'signal' }, ({ payload }) => handleSignal(payload));

  channel.on('postgres_changes',
    { event: '*', schema: 'public', table: 'convoy_members', filter: `convoy_id=eq.${state.convoy.id}` },
    handleMemberRowChange
  );
  channel.on('postgres_changes',
    { event: '*', schema: 'public', table: 'locations', filter: `convoy_id=eq.${state.convoy.id}` },
    (payload) => { if (payload.new) handleLocationUpdate(payload.new, false); }
  );

  channel.subscribe(async (status) => {
    setConnDot(status === 'SUBSCRIBED');
    if (status === 'SUBSCRIBED') {
      await channel.track({ user_id: state.user.id, display_name: state.profile.display_name, online_at: Date.now() });
    } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
      scheduleRealtimeReconnect();
    }
  });

  state.channel = channel;
}

// Debounced so a burst of error/timeout callbacks only triggers one reconnect attempt.
let realtimeReconnectTimer = null;
function scheduleRealtimeReconnect(){
  if (realtimeReconnectTimer) return;
  realtimeReconnectTimer = setTimeout(() => {
    realtimeReconnectTimer = null;
    if (state.convoy && navigator.onLine) reconnectRealtime();
  }, 3000);
}

// Full reconnect: fresh realtime channel + fresh WebRTC connections.
// A network path change (wifi <-> cellular, VPN toggling, sleep/wake)
// can silently invalidate the old ICE candidates even though nothing
// in the UI shows an obvious error, which is what previously required
// a manual page refresh to fix.
function reconnectRealtime(){
  if (state.channel) { supabaseClient.removeChannel(state.channel); state.channel = null; }
  resetAllPeerConnections();
  subscribeRealtime();
}

function setConnDot(online){
  $('#conn-dot').classList.toggle('offline', !online);
}

function handlePresenceSync(){
  const presenceState = state.channel.presenceState();
  const onlineIds = new Set(Object.keys(presenceState));
  for (const [userId, meta] of state.members.entries()) {
    meta.online = onlineIds.has(userId);
  }
  onlineIds.forEach(peerId => {
    if (peerId === state.user.id) return;
    if (!state.members.has(peerId)) {
      state.channelNoCounter++;
      state.members.set(peerId, { display_name: 'Member', role: 'member', online: true, channel_no: state.channelNoCounter });
    }
    maybeInitiatePeerConnection(peerId);
  });
  renderMemberList();
  refreshAllMarkers();
}

function markOnline(userId, online){
  const m = state.members.get(userId);
  if (m) m.online = online;
  if (!online) {
    const entry = state.peers.get(userId);
    if (entry) { clearReconnectTimer(entry); entry.pc.close(); state.peers.delete(userId); }
    const audioEl = document.getElementById('audio-' + userId);
    if (audioEl) audioEl.remove();
  }
  renderMemberList();
  refreshAllMarkers();
}

function handleMemberRowChange(payload){
  if (payload.eventType === 'DELETE') {
    state.members.delete(payload.old.user_id);
    removeMarker(payload.old.user_id);
  } else {
    const row = payload.new;
    const existing = state.members.get(row.user_id);
    if (existing) {
      existing.display_name = row.display_name;
      existing.role = row.role;
    } else {
      state.channelNoCounter++;
      state.members.set(row.user_id, { display_name: row.display_name, role: row.role, online: false, channel_no: state.channelNoCounter });
    }
  }
  renderMemberList();
  refreshAllMarkers();
}

function handleLocationUpdate(payload, fromBroadcast){
  const userId = payload.user_id;
  if (userId === state.user.id) return;
  const existing = state.locations.get(userId);
  if (existing && payload.updated_at && new Date(payload.updated_at) < new Date(existing.updated_at)) return; // stale
  const loc = {
    lat: payload.lat, lng: payload.lng, heading: payload.heading, speed: payload.speed,
    accuracy: payload.accuracy, updated_at: payload.updated_at
  };
  state.locations.set(userId, loc);
  if (!state.members.has(userId)) {
    state.channelNoCounter++;
    state.members.set(userId, { display_name: 'Member', role: 'member', online: true, channel_no: state.channelNoCounter });
  }
  upsertMemberMarker(userId, loc);
  renderMemberList();
}

function handleTalkingUpdate(payload){
  const { user_id, talking } = payload;
  if (talking) state.talking.add(user_id); else state.talking.delete(user_id);
  renderTalkingStrip();
  refreshAllMarkers();
  renderMemberList();
}

function broadcastTalking(talking){
  state.channel?.send({ type: 'broadcast', event: 'talking', payload: { user_id: state.user.id, talking } });
  if (talking) state.talking.add(state.user.id); else state.talking.delete(state.user.id);
  renderTalkingStrip();
  refreshAllMarkers();
}

function renderTalkingStrip(){
  const strip = $('#talking-strip');
  strip.innerHTML = '';
  state.talking.forEach(userId => {
    const name = userId === state.user.id ? 'You' : (state.members.get(userId)?.display_name || 'Member');
    const chip = document.createElement('div');
    chip.className = 'talk-chip';
    chip.innerHTML = `🔊 ${escapeHtml(name)}`;
    strip.appendChild(chip);
  });
}

/* ============================================================
   8. WEBRTC — mesh voice (push-to-talk)
   ------------------------------------------------------------
   Includes "perfect negotiation" (polite/impolite roles) to avoid
   silent glare failures, ICE candidate queueing for out-of-order
   signaling, automatic ICE restart + connection recreation when a
   link degrades, and mic-track health checks — together these
   are what previously required a manual page refresh to fix.
   ============================================================ */
async function ensureMicAccess(){
  if (state.localStream || state.micRequested) return state.localStream != null;
  state.micRequested = true;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
    });
    stream.getAudioTracks().forEach(t => {
      t.enabled = false; // muted until PTT held
      t.addEventListener('ended', handleMicTrackEnded);
    });
    state.localStream = stream;
    attachLocalStreamToAllPeers();
    $('#ptt-btn').classList.remove('disabled');
    return true;
  } catch (err) {
    state.micRequested = false;
    $('#ptt-btn').classList.add('disabled');
    showToast('Microphone permission is required for push-to-talk. Enable it in your browser settings.', 'error');
    return false;
  }
}

// Mobile browsers can silently end the mic track after the tab is
// backgrounded / the screen locks for a while. Without this handler
// the local sender keeps referencing a dead track forever and voice
// stays broken until a manual refresh.
function handleMicTrackEnded(){
  if (!state.localStream) return;
  showToast('Microphone was disconnected — reconnecting…', 'error');
  state.localStream.getTracks().forEach(t => t.stop());
  state.localStream = null;
  state.micRequested = false;
  pttActive = false;
  $('#ptt-btn').classList.remove('active');
  ensureMicAccess();
}

// Attaches (or re-attaches, via replaceTrack) the current local
// audio track to every peer. Using replaceTrack on an existing
// sender — instead of addTrack again — keeps exactly one audio
// sender per connection even across repeated mic reconnects.
function attachLocalStreamToAllPeers(){
  if (!state.localStream) return;
  const track = state.localStream.getAudioTracks()[0];
  if (!track) return;
  state.peers.forEach(entry => {
    if (entry.audioSender) {
      entry.audioSender.replaceTrack(track).catch(err => console.warn('replaceTrack failed', err));
    } else {
      entry.audioSender = entry.pc.addTrack(track, state.localStream);
    }
  });
}

function getOrCreatePeer(peerId){
  if (state.peers.has(peerId)) return state.peers.get(peerId);
  const polite = state.user.id > peerId; // deterministic role: higher id yields on glare
  const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  const entry = {
    pc, polite, makingOffer: false, ignoreOffer: false,
    pendingCandidates: [], audioSender: null, reconnectTimer: null
  };
  state.peers.set(peerId, entry);

  if (state.localStream) {
    const track = state.localStream.getAudioTracks()[0];
    if (track) entry.audioSender = pc.addTrack(track, state.localStream);
  }

  pc.onicecandidate = (e) => {
    if (e.candidate) sendSignal(peerId, { type: 'ice', candidate: e.candidate.toJSON() });
  };

  pc.ontrack = (e) => {
    let audioEl = document.getElementById('audio-' + peerId);
    if (!audioEl) {
      audioEl = document.createElement('audio');
      audioEl.id = 'audio-' + peerId;
      audioEl.autoplay = true;
      audioEl.playsInline = true;
      document.body.appendChild(audioEl);
    }
    audioEl.srcObject = e.streams[0];
    audioEl.play().catch(() => { /* resolved on next user gesture via unlockAudioPlayback() */ });
  };

  pc.onnegotiationneeded = async () => {
    try {
      entry.makingOffer = true;
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      sendSignal(peerId, { type: 'offer', sdp: pc.localDescription });
    } catch (err) { console.warn('negotiation failed', err); }
    finally { entry.makingOffer = false; }
  };

  pc.oniceconnectionstatechange = () => {
    const s = pc.iceConnectionState;
    if (s === 'connected' || s === 'completed') {
      clearReconnectTimer(entry);
    } else if (s === 'failed') {
      try { pc.restartIce(); } catch (e) { /* not supported in this browser */ }
      scheduleConnectionHealthCheck(peerId, 1500);
    } else if (s === 'disconnected') {
      scheduleConnectionHealthCheck(peerId, 6000);
    }
  };

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'failed' || pc.connectionState === 'closed') {
      scheduleConnectionHealthCheck(peerId, 1000);
    }
  };

  return entry;
}

function clearReconnectTimer(entry){
  if (entry.reconnectTimer) { clearTimeout(entry.reconnectTimer); entry.reconnectTimer = null; }
}

// If a connection is still not healthy after `delay`, tear it down
// and build a fresh one — this is what replaces "refresh the page".
function scheduleConnectionHealthCheck(peerId, delay){
  const entry = state.peers.get(peerId);
  if (!entry || entry.reconnectTimer) return;
  entry.reconnectTimer = setTimeout(() => {
    const current = state.peers.get(peerId);
    if (!current) return;
    current.reconnectTimer = null;
    const stillOnline = !!state.channel?.presenceState()[peerId];
    if (!stillOnline) return; // presence 'leave' handler already cleaned this up
    const healthy = current.pc.connectionState === 'connected' || current.pc.connectionState === 'connecting';
    if (!healthy) recreatePeerConnection(peerId);
  }, delay);
}

function recreatePeerConnection(peerId){
  const entry = state.peers.get(peerId);
  if (entry) {
    clearReconnectTimer(entry);
    entry.pc.close();
    state.peers.delete(peerId);
  }
  const audioEl = document.getElementById('audio-' + peerId);
  if (audioEl) audioEl.remove();
  maybeInitiatePeerConnection(peerId, true);
}

function maybeInitiatePeerConnection(peerId, force){
  if (!force && state.peers.has(peerId)) return;
  // Deterministic initiator: the lexicographically smaller user id starts the offer, avoids glare.
  if (state.user.id < peerId) {
    initiateConnection(peerId);
  } else {
    getOrCreatePeer(peerId); // wait for their offer
  }
}

async function initiateConnection(peerId){
  const entry = getOrCreatePeer(peerId);
  try {
    entry.makingOffer = true;
    const offer = await entry.pc.createOffer({ offerToReceiveAudio: true });
    await entry.pc.setLocalDescription(offer);
    sendSignal(peerId, { type: 'offer', sdp: entry.pc.localDescription });
  } catch (err) { console.warn('offer failed', err); }
  finally { entry.makingOffer = false; }
}

function sendSignal(to, payload){
  state.channel?.send({ type: 'broadcast', event: 'signal', payload: { to, from: state.user.id, ...payload } });
}

async function flushPendingCandidates(entry){
  const queued = entry.pendingCandidates.splice(0);
  for (const candidate of queued) {
    try { await entry.pc.addIceCandidate(candidate); } catch (err) { console.warn('queued ICE candidate failed', err); }
  }
}

async function handleSignal(payload){
  if (payload.to !== state.user.id) return;
  const peerId = payload.from;
  const entry = getOrCreatePeer(peerId);
  const pc = entry.pc;
  try {
    if (payload.type === 'offer') {
      const offerCollision = entry.makingOffer || pc.signalingState !== 'stable';
      entry.ignoreOffer = !entry.polite && offerCollision;
      if (entry.ignoreOffer) return;
      await pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
      await flushPendingCandidates(entry);
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      sendSignal(peerId, { type: 'answer', sdp: pc.localDescription });
    } else if (payload.type === 'answer') {
      if (pc.signalingState === 'have-local-offer') {
        await pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
        await flushPendingCandidates(entry);
      }
    } else if (payload.type === 'ice') {
      if (pc.remoteDescription && pc.remoteDescription.type) {
        try { await pc.addIceCandidate(payload.candidate); } catch (err) { if (!entry.ignoreOffer) console.warn(err); }
      } else {
        entry.pendingCandidates.push(payload.candidate); // remote description not set yet — queue it
      }
    }
  } catch (err) { console.warn('signal handling failed', err); }
}

// Tears down every peer connection but keeps the local mic stream
// alive — used when the realtime/network path changes (e.g. wifi
// to cellular handover), since the old ICE candidates are no longer
// valid but the mic itself is still fine.
function resetAllPeerConnections(){
  state.peers.forEach(entry => { clearReconnectTimer(entry); entry.pc.close(); });
  state.peers.clear();
  $all('audio[id^="audio-"]').forEach(el => el.remove());
}

function closeAllPeers(){
  resetAllPeerConnections();
  if (state.localStream) {
    state.localStream.getTracks().forEach(t => t.stop());
    state.localStream = null;
  }
  state.micRequested = false;
}

// Periodic self-healing: catches degraded mic tracks or peer
// connections even if no browser event fires to tell us about it.
function checkMicHealth(){
  if (!state.localStream) return;
  const track = state.localStream.getAudioTracks()[0];
  if (!track || track.readyState === 'ended') {
    state.localStream.getTracks().forEach(t => t.stop());
    state.localStream = null;
    state.micRequested = false;
    ensureMicAccess();
  }
}

function checkPeerHealth(){
  state.peers.forEach((entry, peerId) => {
    if (entry.pc.connectionState === 'failed' || entry.pc.connectionState === 'closed') {
      recreatePeerConnection(peerId);
    }
  });
}

// Some mobile browsers block autoplay of the very first remote
// audio element until the user interacts with the page again.
function unlockAudioPlayback(){
  $all('audio[id^="audio-"]').forEach(el => { if (el.paused) el.play().catch(() => {}); });
}
document.addEventListener('click', unlockAudioPlayback);
document.addEventListener('touchend', unlockAudioPlayback);

let pttActive = false;
async function startTalking(){
  if (pttActive) return;
  const ok = await ensureMicAccess();
  if (!ok) return;
  pttActive = true;
  state.localStream.getAudioTracks().forEach(t => { t.enabled = true; });
  $('#ptt-btn').classList.add('active');
  broadcastTalking(true);
}
function stopTalking(){
  if (!pttActive) return;
  pttActive = false;
  if (state.localStream) state.localStream.getAudioTracks().forEach(t => { t.enabled = false; });
  $('#ptt-btn').classList.remove('active');
  broadcastTalking(false);
}

const pttBtn = $('#ptt-btn');
['mousedown', 'touchstart'].forEach(ev => pttBtn.addEventListener(ev, (e) => { e.preventDefault(); startTalking(); }, { passive: false }));
['mouseup', 'mouseleave', 'touchend', 'touchcancel'].forEach(ev => pttBtn.addEventListener(ev, (e) => { e.preventDefault(); stopTalking(); }, { passive: false }));
document.addEventListener('keydown', (e) => { if (e.code === 'Space' && !e.repeat && !isTypingTarget(e.target)) { e.preventDefault(); startTalking(); } });
document.addEventListener('keyup', (e) => { if (e.code === 'Space') { e.preventDefault(); stopTalking(); } });
function isTypingTarget(el){ return el.tagName === 'INPUT' || el.tagName === 'TEXTAREA'; }
window.addEventListener('blur', stopTalking);

/* ============================================================
   9. GEOLOCATION — battery-aware tracking
   ============================================================ */
if ('getBattery' in navigator) {
  navigator.getBattery().then(b => {
    state.battery = b;
    b.addEventListener('levelchange', () => {});
    b.addEventListener('chargingchange', () => {});
  }).catch(() => {});
}

function getAdaptiveInterval(){
  if (document.hidden) return LOCATION_BACKGROUND_INTERVAL_MS;
  if (state.battery && !state.battery.charging && state.battery.level < 0.2) return LOCATION_LOW_BATTERY_INTERVAL_MS;
  return LOCATION_MIN_INTERVAL_MS;
}

function requestGeolocationAndStart(){
  if (!('geolocation' in navigator)) {
    showBanner('Geolocation is not supported on this device.', 'error');
    return;
  }
  startLocationTracking();
}

// Called as the very first thing inside the Create/Join submit
// handlers — synchronously, before any `await` — so the browser
// ties the location + microphone permission prompts directly to
// the user's tap. Some browsers (notably Safari/iOS) only honor
// getUserMedia()/geolocation requests while the original user
// gesture is still "fresh"; requesting them only later, after
// several network awaits deep in the convoy-join flow, can cause
// the prompt to be silently skipped or blocked. Both underlying
// calls are idempotent, so this is safe to call again later too.
function primePermissions(){
  requestGeolocationAndStart();
  ensureMicAccess();
}

// If convoy creation/joining ultimately fails, undo anything we
// started early so a permission we no longer need doesn't linger.
function cancelPrimedPermissionsIfNoConvoy(){
  if (state.convoy) return; // succeeded — keep everything running
  stopLocationTracking();
  if (state.localStream) {
    state.localStream.getTracks().forEach(t => t.stop());
    state.localStream = null;
  }
  state.micRequested = false;
}

function startLocationTracking(){
  if (state.watchId != null) return;
  state.watchId = navigator.geolocation.watchPosition(onPosition, onPositionError, {
    enableHighAccuracy: true, maximumAge: 1000, timeout: 15000
  });
}

function stopLocationTracking(){
  if (state.watchId != null) { navigator.geolocation.clearWatch(state.watchId); state.watchId = null; }
}

function onPosition(pos){
  if (!state.convoy) return; // permission was primed before the convoy finished being created/joined — ignore until ready
  hideBanner();
  const { latitude, longitude, heading, speed, accuracy } = pos.coords;
  const now = Date.now();
  if (now - state.lastSentAt < getAdaptiveInterval()) return;

  let computedHeading = (heading !== null && heading !== undefined && !isNaN(heading)) ? heading : null;
  let computedSpeed = (speed !== null && speed !== undefined && !isNaN(speed)) ? speed : null;

  if (state.lastCoords) {
    const distMoved = haversineMeters(state.lastCoords.lat, state.lastCoords.lng, latitude, longitude);
    const dt = (now - state.lastCoordsTime) / 1000;
    if (computedHeading === null && distMoved > 3) {
      computedHeading = bearingDegrees(state.lastCoords.lat, state.lastCoords.lng, latitude, longitude);
    }
    if (computedSpeed === null && dt > 0) computedSpeed = distMoved / dt;
  }

  state.lastCoords = { lat: latitude, lng: longitude };
  state.lastCoordsTime = now;
  state.lastSentAt = now;

  const updatedAt = new Date().toISOString();
  state.myLocation = { lat: latitude, lng: longitude, heading: computedHeading, speed: computedSpeed, accuracy, updated_at: updatedAt };

  upsertMemberMarker(state.user.id, state.myLocation);
  renderMemberList();

  state.channel?.send({
    type: 'broadcast', event: 'location',
    payload: { user_id: state.user.id, ...state.myLocation }
  });

  supabaseClient.from('locations').upsert({
    convoy_id: state.convoy.id, user_id: state.user.id,
    lat: latitude, lng: longitude, heading: computedHeading, speed: computedSpeed, accuracy,
    updated_at: updatedAt
  }, { onConflict: 'convoy_id,user_id' }).then(({ error }) => { if (error) console.error('location upsert failed', error); });
}

function onPositionError(err){
  if (err.code === err.PERMISSION_DENIED) {
    showBanner('Location permission denied. Enable it in your browser settings to share your position.', 'error');
  } else if (err.code === err.TIMEOUT) {
    showBanner('Waiting for GPS signal…', 'info');
  } else {
    showBanner('Location unavailable right now.', 'error');
  }
}

function showBanner(text, type){
  const el = $('#gps-banner');
  el.textContent = text;
  el.className = 'banner' + (type === 'info' ? ' info' : '');
  el.classList.remove('hidden');
}
function hideBanner(){ $('#gps-banner').classList.add('hidden'); }

/* ============================================================
   10. MAP — Leaflet, markers, popups
   ============================================================ */
function initMap(){
  state.map = L.map('map', { zoomControl: false, attributionControl: true }).setView([20, 0], 3);
  L.control.zoom({ position: 'bottomright' }).addTo(state.map);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
  }).addTo(state.map);
}

function markerHtml(userId, loc){
  const isMe = userId === state.user.id;
  const online = isMe ? true : (state.members.get(userId)?.online ?? false);
  const talking = state.talking.has(userId);
  const color = isMe ? 'var(--accent-2)' : colorForUser(userId);
  const hasHeading = loc.heading !== null && loc.heading !== undefined;
  const rotation = hasHeading ? loc.heading : 0;
  const name = isMe ? 'You' : (state.members.get(userId)?.display_name || 'Member');
  return `<div class="marker-wrap ${hasHeading ? '' : 'no-heading'} ${online ? '' : 'marker-offline'} ${talking ? 'marker-talking' : ''}">
    <div class="marker-icon-box">
      <div class="marker-arrow" style="transform:rotate(${rotation}deg); background:${color};"></div>
    </div>
    <div class="marker-label">${escapeHtml(name)}</div>
  </div>`;
}

function popupHtml(userId, loc){
  const isMe = userId === state.user.id;
  const name = isMe ? 'You' : (state.members.get(userId)?.display_name || 'Member');
  const dist = isMe ? null : distanceFromMe(loc);
  return `<div class="popup-name">${escapeHtml(name)}</div>
    <div class="popup-row">Speed: ${formatSpeed(loc.speed)}</div>
    <div class="popup-row">Heading: ${loc.heading != null ? Math.round(loc.heading) + '°' : '—'}</div>
    ${dist != null ? `<div class="popup-row">Distance: ${formatDistance(dist)}</div>` : ''}
    <div class="popup-row">Updated: ${formatRelativeTime(loc.updated_at)}</div>`;
}

function upsertMemberMarker(userId, loc){
  if (loc.lat == null || loc.lng == null) return;
  state.locations.set(userId, loc);
  let marker = state.markers.get(userId);
  // iconAnchor points at the CENTER of .marker-icon-box (24x24, sitting
  // at the very top of the wrap with no offset above it), not at the
  // label underneath — this is what makes the marker sit exactly on
  // the real GPS coordinate instead of appearing to float above it.
  const icon = L.divIcon({
    html: markerHtml(userId, loc), className: '', iconSize: [40, 50],
    iconAnchor: [20, 12], popupAnchor: [0, -12]
  });
  if (!marker) {
    marker = L.marker([loc.lat, loc.lng], { icon }).addTo(state.map);
    state.markers.set(userId, marker);
    if (state.markers.size === 1) state.map.setView([loc.lat, loc.lng], 15);
  } else {
    marker.setLatLng([loc.lat, loc.lng]);
    marker.setIcon(icon);
  }
  marker.bindPopup(popupHtml(userId, loc));
}

function refreshAllMarkers(){
  state.locations.forEach((loc, userId) => upsertMemberMarker(userId, loc));
}

function removeMarker(userId){
  const marker = state.markers.get(userId);
  if (marker) { state.map.removeLayer(marker); state.markers.delete(userId); }
  state.locations.delete(userId);
}

function clearMapMarkers(){
  state.markers.forEach(m => state.map.removeLayer(m));
  state.markers.clear();
}

function distanceFromMe(loc){
  if (!state.myLocation) return null;
  return haversineMeters(state.myLocation.lat, state.myLocation.lng, loc.lat, loc.lng);
}

$('#recenter-btn').addEventListener('click', () => {
  if (state.myLocation) state.map.flyTo([state.myLocation.lat, state.myLocation.lng], Math.max(state.map.getZoom(), 15));
  else showToast('Your location is not available yet.');
});

/* ============================================================
   11. MEMBER LIST (drawer)
   ============================================================ */
function renderMemberList(){
  const list = $('#member-list');
  const entries = Array.from(state.members.entries());
  if (entries.length === 0) { list.innerHTML = '<div class="member-empty">No members yet.</div>'; return; }

  entries.sort((a, b) => {
    if (a[0] === state.user.id) return -1;
    if (b[0] === state.user.id) return 1;
    return (a[1].display_name || '').localeCompare(b[1].display_name || '');
  });

  list.innerHTML = entries.map(([userId, m]) => {
    const isMe = userId === state.user.id;
    const loc = state.locations.get(userId);
    const online = isMe ? true : m.online;
    const talking = state.talking.has(userId);
    const dist = (!isMe && loc) ? distanceFromMe(loc) : null;
    const locatable = !!loc;
    return `<div class="member-card ${talking ? 'talking' : ''} ${locatable ? 'locatable' : ''}" data-user-id="${escapeHtml(userId)}" role="button" tabindex="0" title="${locatable ? 'Show on map' : 'No location yet'}">
      <div class="member-chan" style="--chan-color:${colorForUser(userId)}">CH${String(m.channel_no ?? '-').padStart(2,'0')}</div>
      <div class="member-main">
        <div class="member-name-row">
          <span class="status-dot ${online ? '' : 'offline'}"></span>
          <span class="member-name ${isMe ? 'me' : ''}">${escapeHtml(isMe ? 'You' : m.display_name)}</span>
          ${m.role === 'owner' ? '<span class="member-tag">OWNER</span>' : ''}
          ${talking ? '<span class="member-tag" style="color:var(--accent)">TALKING</span>' : ''}
        </div>
        <div class="member-stats">
          <span>SPD <b>${loc ? formatSpeed(loc.speed) : '—'}</b></span>
          ${!isMe ? `<span>DIST <b>${formatDistance(dist)}</b></span>` : ''}
        </div>
        <div class="member-updated">${online ? 'Online' : 'Offline'} · ${loc ? formatRelativeTime(loc.updated_at) : 'no data'}</div>
      </div>
      ${locatable ? '<span class="member-locate">📍</span>' : ''}
    </div>`;
  }).join('');
}

function startTicker(){
  stopTicker();
  state.tickerTimer = setInterval(() => {
    renderMemberList();
    // Downgrade visual status if no update for too long even if presence hasn't caught up
    let changed = false;
    state.locations.forEach((loc, userId) => {
      if (userId === state.user.id) return;
      const m = state.members.get(userId);
      if (!m) return;
      const stale = Date.now() - new Date(loc.updated_at).getTime() > STALE_OFFLINE_MS;
      if (stale && m.online === true && !state.channel?.presenceState()[userId]) { m.online = false; changed = true; }
    });
    if (changed) refreshAllMarkers();
  }, 1000);
}
function stopTicker(){ if (state.tickerTimer) { clearInterval(state.tickerTimer); state.tickerTimer = null; } }

/* ============================================================
   12. HEARTBEAT — keep last_seen fresh, resilient to drops
   ============================================================ */
function startHeartbeat(){
  stopHeartbeat();
  state.heartbeatTimer = setInterval(() => {
    if (!state.convoy) return;
    supabaseClient.from('convoy_members')
      .update({ last_seen: new Date().toISOString(), is_online: true })
      .eq('convoy_id', state.convoy.id).eq('user_id', state.user.id)
      .then(({ error }) => { if (error) console.warn('heartbeat failed', error); });
  }, HEARTBEAT_MS);
}
function stopHeartbeat(){ if (state.heartbeatTimer) { clearInterval(state.heartbeatTimer); state.heartbeatTimer = null; } }

/* ============================================================
   12b. SELF-HEALING HEALTH CHECK
   ------------------------------------------------------------
   Runs independently of any browser event so degraded mic tracks,
   stuck peer connections, or a dead realtime socket get fixed on
   their own instead of requiring a manual page refresh.
   ============================================================ */
function startHealthCheck(){
  stopHealthCheck();
  state.healthCheckTimer = setInterval(() => {
    if (!state.convoy || !navigator.onLine) return;
    checkMicHealth();
    checkPeerHealth();
    if (!state.channel || ['closed', 'errored'].includes(state.channel.state)) {
      reconnectRealtime();
    }
  }, 20000);
}
function stopHealthCheck(){ if (state.healthCheckTimer) { clearInterval(state.healthCheckTimer); state.healthCheckTimer = null; } }

/* ============================================================
   13. DRAWER (roster panel)
   ============================================================ */
function openDrawer(){ $('#drawer').classList.add('open'); $('#drawer-backdrop').classList.add('open'); }
function closeDrawer(){ $('#drawer').classList.remove('open'); $('#drawer-backdrop').classList.remove('open'); }
$('#roster-btn').addEventListener('click', openDrawer);
$('#drawer-close').addEventListener('click', closeDrawer);
$('#drawer-backdrop').addEventListener('click', closeDrawer);

// Tapping a member's card (name, avatar, or row) centers the map on
// their last known position and opens their info popup.
function focusOnMember(userId){
  const loc = state.locations.get(userId);
  if (!loc) { showToast('No location yet for this member.'); return; }
  closeDrawer();
  const targetZoom = Math.max(state.map.getZoom(), 16);
  state.map.flyTo([loc.lat, loc.lng], targetZoom, { duration: 0.6 });
  const marker = state.markers.get(userId);
  if (marker) marker.openPopup();
}
$('#member-list').addEventListener('click', (e) => {
  const card = e.target.closest('.member-card');
  if (!card || !card.dataset.userId) return;
  focusOnMember(card.dataset.userId);
});
$('#member-list').addEventListener('keydown', (e) => {
  if (e.key !== 'Enter' && e.key !== ' ') return;
  const card = e.target.closest('.member-card');
  if (!card || !card.dataset.userId) return;
  e.preventDefault();
  focusOnMember(card.dataset.userId);
});

/* ============================================================
   14. DARK / LIGHT MODE
   ============================================================ */
function applyTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('convoy_intercom_theme', theme);
  $('#theme-btn').textContent = theme === 'dark' ? '◐' : '◑';
}
(function initTheme(){
  const saved = localStorage.getItem('convoy_intercom_theme');
  const preferred = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  applyTheme(preferred);
})();
$('#theme-btn').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  applyTheme(current === 'dark' ? 'light' : 'dark');
});

/* ============================================================
   15. PWA — manifest, install prompt, best-effort service worker
   ============================================================ */
(function setupManifest(){
  const iconSvg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
    <rect width='100' height='100' rx='20' fill='%230b0e11'/>
    <circle cx='50' cy='42' r='22' fill='%23ff9f1c'/>
    <path d='M50 42 L50 90' stroke='%232dd4bf' stroke-width='8' stroke-linecap='round'/>
  </svg>`;
  const iconDataUri = 'data:image/svg+xml,' + encodeURIComponent(iconSvg);
  const manifest = {
    name: 'Convoy Intercom',
    short_name: 'Convoy',
    description: 'Live convoy GPS tracking and push-to-talk voice.',
    start_url: '.',
    scope: '.',
    display: 'standalone',
    background_color: '#0b0e11',
    theme_color: '#0b0e11',
    icons: [
      { src: iconDataUri, sizes: '192x192', type: 'image/svg+xml' },
      { src: iconDataUri, sizes: '512x512', type: 'image/svg+xml' }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  $('#manifest-link').setAttribute('href', URL.createObjectURL(blob));
})();

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  state.deferredInstallPrompt = e;
  $('#install-btn').classList.remove('hidden');
});
$('#install-btn').addEventListener('click', async () => {
  if (!state.deferredInstallPrompt) return;
  state.deferredInstallPrompt.prompt();
  await state.deferredInstallPrompt.userChoice;
  state.deferredInstallPrompt = null;
  $('#install-btn').classList.add('hidden');
});
window.addEventListener('appinstalled', () => { $('#install-btn').classList.add('hidden'); });

// Best-effort service worker for installability signals on browsers that allow blob-based registration.
// NOTE: most browsers block registering a ServiceWorker from a blob: URL for security reasons, so this
// is wrapped defensively and the app works fully without it. For full offline caching + guaranteed
// install prompts, add a real sw.js file alongside index.html (see SETUP_INSTRUCTIONS.md, optional).
if ('serviceWorker' in navigator) {
  const swCode = `
    self.addEventListener('install', () => self.skipWaiting());
    self.addEventListener('activate', (e) => e.waitUntil(self.clients.claim()));
    self.addEventListener('fetch', () => {}); // network passthrough
  `;
  try {
    const swBlob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl).catch(() => { /* silently ignore unsupported blob SW */ });
  } catch (e) { /* ignore */ }
}

/* ============================================================
   16. NETWORK RESILIENCE — auto-reconnect
   ============================================================ */
window.addEventListener('online', () => {
  showToast('Back online — reconnecting…');
  if (state.convoy) {
    reconnectRealtime();
    if (state.watchId == null) startLocationTracking();
    checkMicHealth();
  }
});
window.addEventListener('offline', () => {
  setConnDot(false);
  showToast('You are offline. Convoy updates paused.', 'error');
});
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && state.convoy) {
    if (state.watchId == null) startLocationTracking();
    if (!state.channel || state.channel.state !== 'joined') {
      reconnectRealtime();
    } else {
      checkPeerHealth();
    }
    checkMicHealth();
    unlockAudioPlayback();
  }
});

/* ============================================================
   17. BOOTSTRAP
   ============================================================ */
(async function bootstrap(){
  if (!supabaseClient) {
    const msg = $('#auth-msg');
    msg.dataset.persist = '1'; // survives tab switches, since this needs fixing before anything else works
    setFormMsg('#auth-msg',
      'Setup needed: open index.html and paste your real Supabase URL and anon key at the top of the <script> section (see SETUP_INSTRUCTIONS.md). ' +
      (supabaseInitError ? `Detail: ${supabaseInitError}` : ''),
      'error');
    showScreen('auth');
    return;
  }
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (session) {
    state.session = session;
    state.user = session.user;
    const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
    state.profile = profile || { id: session.user.id, display_name: session.user.email.split('@')[0] };
    $('#welcome-name').textContent = `Hi, ${state.profile.display_name}`;
    await afterAuthSuccess();
  } else {
    showScreen('auth');
  }
})();
</script>
</body>
</html>
