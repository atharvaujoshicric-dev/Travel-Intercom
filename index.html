<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Convoy Intercom</title>
<meta name="theme-color" content="#0f172a">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- Leaflet Routing Machine (route search/preview) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
<!-- Supabase JS -->
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<style>
/* ================= THEME ================= */
:root{
  --bg:#f3f4f6; --bg2:#ffffff; --text:#111827; --muted:#6b7280; --border:#e5e7eb;
  --accent:#2563eb; --accent2:#1d4ed8; --danger:#dc2626; --success:#16a34a;
  --card:#ffffff; --shadow:0 2px 10px rgba(0,0,0,.08);
}
[data-theme="dark"]{
  --bg:#0f172a; --bg2:#111827; --text:#e5e7eb; --muted:#9ca3af; --border:#1f2937;
  --accent:#3b82f6; --accent2:#2563eb; --danger:#ef4444; --success:#22c55e;
  --card:#1e293b; --shadow:0 2px 10px rgba(0,0,0,.4);
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg); color:var(--text); transition:background .2s,color .2s;
}
button{font-family:inherit;cursor:pointer;}
input,select{font-family:inherit;}
a{color:var(--accent);}
.hidden{display:none !important;}
#app{max-width:520px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;display:flex;flex-direction:column;}
@media(min-width:900px){#app{max-width:900px;}}

/* ---- top bar ---- */
.topbar{
  display:flex;align-items:center;justify-content:space-between;padding:14px 16px;
  background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;
}
.topbar h1{font-size:18px;margin:0;font-weight:700;}
.iconbtn{background:none;border:none;color:var(--text);font-size:20px;padding:6px 8px;border-radius:8px;}
.iconbtn:hover{background:var(--border);}

/* ---- forms/cards ---- */
.screen{padding:16px;flex:1;overflow-y:auto;}
.card{background:var(--card);border-radius:14px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px;font-weight:600;}
.field input,.field select{
  width:100%;padding:11px 12px;border-radius:10px;border:1px solid var(--border);
  background:var(--bg);color:var(--text);font-size:15px;
}
.btn{
  width:100%;padding:12px 14px;border-radius:10px;border:none;background:var(--accent);
  color:#fff;font-weight:700;font-size:15px;transition:.15s;
}
.btn:hover{background:var(--accent2);}
.btn.secondary{background:var(--bg);color:var(--text);border:1px solid var(--border);}
.btn.danger{background:var(--danger);}
.btn.success{background:var(--success);}
.btn.small{width:auto;padding:8px 12px;font-size:13px;}
.row{display:flex;gap:10px;}
.row>*{flex:1;}
.link-btn{background:none;border:none;color:var(--accent);font-weight:600;font-size:14px;padding:6px 0;width:100%;}
.error-msg{color:var(--danger);font-size:13px;margin-top:8px;}
.muted{color:var(--muted);font-size:13px;}
.center{text-align:center;}

/* ---- ads carousel ---- */
.ads-wrap{margin-bottom:16px;}
.ads-track{display:flex;gap:10px;overflow-x:auto;scroll-snap-type:x mandatory;padding-bottom:4px;}
.ad-card{
  min-width:260px;scroll-snap-align:start;border-radius:14px;overflow:hidden;background:var(--card);
  box-shadow:var(--shadow);position:relative;text-decoration:none;color:inherit;
}
.ad-card img,.ad-card video{width:100%;height:130px;object-fit:cover;display:block;}
.ad-card .ad-title{padding:8px 10px;font-size:13px;font-weight:600;}
.ad-tag{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.6);color:#fff;font-size:10px;padding:2px 6px;border-radius:6px;}

/* ---- convoy list (whatsapp-style) ---- */
.convoy-row{
  display:flex;align-items:center;gap:12px;padding:12px;background:var(--card);
  border-radius:12px;margin-bottom:8px;box-shadow:var(--shadow);
}
.convoy-row:active{transform:scale(.99);}
.convoy-avatar{
  width:46px;height:46px;border-radius:50%;background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;flex-shrink:0;
}
.convoy-info{flex:1;min-width:0;}
.convoy-info .name{font-weight:700;font-size:15px;}
.convoy-info .sub{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.badge{font-size:10.5px;background:var(--accent);color:#fff;padding:2px 7px;border-radius:20px;font-weight:700;}
.fab{
  position:fixed;bottom:24px;right:calc(50% - 260px + 24px);width:56px;height:56px;border-radius:50%;
  background:var(--accent);color:#fff;font-size:26px;border:none;box-shadow:0 4px 14px rgba(0,0,0,.3);z-index:30;
}
@media(max-width:560px){.fab{right:20px;}}

/* ---- convoy detail ---- */
#map{width:100%;height:44vh;min-height:260px;border-bottom:1px solid var(--border);}
.member-list{padding:10px 12px;}
.member-item{
  display:flex;align-items:center;gap:10px;padding:10px;border-radius:12px;background:var(--card);
  margin-bottom:8px;box-shadow:var(--shadow);
}
.member-item.speaking{outline:2px solid var(--success);}
.status-dot{width:10px;height:10px;border-radius:50%;background:var(--muted);flex-shrink:0;}
.status-dot.online{background:var(--success);}
.member-item .m-info{flex:1;min-width:0;}
.member-item .m-name{font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px;}
.member-item .m-meta{font-size:12px;color:var(--muted);}
.mini-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 9px;font-size:11px;color:var(--text);}

/* ---- ptt ---- */
.ptt-bar{
  position:sticky;bottom:0;background:var(--bg2);border-top:1px solid var(--border);
  padding:14px 16px;display:flex;flex-direction:column;align-items:center;gap:8px;z-index:20;
}
.ptt-btn{
  width:88px;height:88px;border-radius:50%;background:var(--accent);color:#fff;border:none;
  font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;text-align:center;
  user-select:none;-webkit-user-select:none;touch-action:none;box-shadow:0 4px 14px rgba(0,0,0,.25);
}
.ptt-btn.active{background:var(--success);transform:scale(1.08);}
.ptt-btn:disabled{background:var(--muted);}
.ptt-status{font-size:12.5px;color:var(--muted);min-height:16px;}

/* ---- modal ---- */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:100;
}
@media(min-width:700px){.modal-overlay{align-items:center;}}
.modal{
  background:var(--bg2);width:100%;max-width:480px;border-radius:16px 16px 0 0;padding:20px;
  max-height:88vh;overflow-y:auto;
}
@media(min-width:700px){.modal{border-radius:16px;}}
.modal h3{margin-top:0;}
.close-x{position:sticky;top:0;float:right;background:none;border:none;font-size:20px;color:var(--muted);}

/* ---- toggle switch ---- */
.switch-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.switch{position:relative;width:44px;height:24px;flex-shrink:0;}
.switch input{opacity:0;width:0;height:0;}
.slider{position:absolute;inset:0;background:var(--muted);border-radius:24px;transition:.2s;}
.slider:before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;}
input:checked+.slider{background:var(--success);}
input:checked+.slider:before{transform:translateX(20px);}

.search-box{display:flex;gap:8px;margin-bottom:8px;}
.toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;
  padding:10px 16px;border-radius:10px;font-size:13.5px;z-index:200;box-shadow:0 4px 14px rgba(0,0,0,.3);
}
.tabs{display:flex;gap:8px;margin-bottom:14px;}
.tab-btn{flex:1;padding:9px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-weight:600;font-size:13px;}
.tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.leaflet-marker-icon.pulse{filter:drop-shadow(0 0 4px rgba(37,99,235,.8));}
</style>
</head>
<body data-theme="light">
<div id="app">

  <!-- ============ AUTH VIEW ============ -->
  <div id="view-auth" class="screen">
    <div class="card" style="margin-top:40px;">
      <h2 class="center" style="margin-top:0;">🚚 Convoy Intercom</h2>
      <div class="tabs">
        <button class="tab-btn active" id="tab-login" onclick="switchAuthTab('login')">Login</button>
        <button class="tab-btn" id="tab-signup" onclick="switchAuthTab('signup')">Sign Up</button>
      </div>

      <div id="login-form">
        <div class="field"><label>Email</label><input id="li-email" type="email" placeholder="you@example.com"></div>
        <div class="field"><label>Password</label><input id="li-pass" type="password" placeholder="••••••••"></div>
        <button class="btn" onclick="doLogin()">Log In</button>
        <div id="login-err" class="error-msg"></div>
      </div>

      <div id="signup-form" class="hidden">
        <div class="field"><label>Full Name</label><input id="su-name" placeholder="John Carter"></div>
        <div class="field"><label>Username (unique, shown on map)</label><input id="su-username" placeholder="john_c"></div>
        <div class="field"><label>Email</label><input id="su-email" type="email" placeholder="you@example.com"></div>
        <div class="field"><label>Mobile Number</label><input id="su-mobile" type="tel" placeholder="+91 98765 43210"></div>
        <div class="field"><label>Blood Group</label>
          <select id="su-blood">
            <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
            <option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
          </select>
        </div>
        <div class="field"><label>Password</label><input id="su-pass" type="password" placeholder="min 6 characters"></div>
        <button class="btn" onclick="doSignup()">Create Account</button>
        <div id="signup-err" class="error-msg"></div>
      </div>
    </div>
  </div>

  <!-- ============ HOME VIEW (ads + convoy list) ============ -->
  <div id="view-home" class="hidden">
    <div class="topbar">
      <h1>🚚 Convoy Intercom</h1>
      <div>
        <button class="iconbtn" onclick="toggleTheme()" title="Toggle theme">🌓</button>
        <button class="iconbtn" id="admin-nav-btn" onclick="openAdmin()" title="Ads admin">📢</button>
        <button class="iconbtn" onclick="openProfile()" title="Profile">👤</button>
      </div>
    </div>
    <div class="screen">
      <div class="ads-wrap">
        <div class="ads-track" id="ads-track"></div>
      </div>
      <div id="convoy-list"></div>
      <div id="empty-state" class="card center hidden">
        <p class="muted">No convoys yet. Create one or join with a code.</p>
      </div>
    </div>
    <button class="fab" onclick="openCreateJoin()">+</button>
  </div>

  <!-- ============ CONVOY DETAIL VIEW ============ -->
  <div id="view-convoy" class="hidden">
    <div class="topbar">
      <button class="iconbtn" onclick="leaveConvoyView()">←</button>
      <h1 id="convoy-title">Convoy</h1>
      <div>
        <button class="iconbtn" onclick="openConvoySettings()" title="Convoy settings">⚙️</button>
      </div>
    </div>
    <div id="map"></div>
    <div class="screen" style="padding-top:8px;">
      <div class="search-box hidden" id="route-search-box">
        <input id="route-search-input" placeholder="Search destination…" style="flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text);">
        <button class="btn small" onclick="searchDestination()">Set Route</button>
        <button class="btn small secondary" onclick="clearRoute()">Clear</button>
      </div>
      <div class="member-list" id="member-list"></div>
    </div>
    <div class="ptt-bar">
      <div class="ptt-status" id="ptt-status">Hold to talk</div>
      <button class="ptt-btn" id="ptt-btn">HOLD<br>TO TALK</button>
    </div>
  </div>

  <!-- ============ PROFILE VIEW ============ -->
  <div id="view-profile" class="hidden">
    <div class="topbar">
      <button class="iconbtn" onclick="closeProfile()">←</button>
      <h1>Profile</h1>
      <div></div>
    </div>
    <div class="screen">
      <div class="card">
        <div class="field"><label>Full Name</label><input id="pf-name"></div>
        <div class="field"><label>Username</label><input id="pf-username"></div>
        <div class="field"><label>Mobile Number</label><input id="pf-mobile"></div>
        <div class="field"><label>Blood Group</label>
          <select id="pf-blood">
            <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
            <option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
          </select>
        </div>
        <button class="btn" onclick="saveProfile()">Save Changes</button>
      </div>
      <div class="card">
        <div class="switch-row">
          <div><b>Share My Location</b><div class="muted">Turn off to stop sharing location everywhere</div></div>
          <label class="switch"><input type="checkbox" id="pf-location-toggle" onchange="toggleGlobalLocation()"><span class="slider"></span></label>
        </div>
      </div>
      <button class="btn danger" onclick="doLogout()">Log Out</button>
    </div>
  </div>

  <!-- ============ ADMIN VIEW (ads management) ============ -->
  <div id="view-admin" class="hidden">
    <div class="topbar">
      <button class="iconbtn" onclick="closeAdmin()">←</button>
      <h1>Ads Admin</h1>
      <div></div>
    </div>
    <div class="screen">
      <div class="card">
        <h3 style="margin-top:0;">New Ad</h3>
        <div class="field"><label>Title</label><input id="ad-title"></div>
        <div class="field"><label>Media URL (image or video)</label><input id="ad-media"></div>
        <div class="field"><label>Type</label>
          <select id="ad-type"><option value="image">Image</option><option value="video">Video</option></select>
        </div>
        <div class="field"><label>Link URL (optional)</label><input id="ad-link"></div>
        <button class="btn" onclick="createAd()">Publish Ad</button>
      </div>
      <div id="ad-manage-list"></div>
    </div>
  </div>
</div>

<!-- generic modal container -->
<div id="modal-root"></div>
<div id="toast-root"></div>

<script>
/* ======================================================================
   CONVOY INTERCOM — single-file app
   PASTE YOUR SUPABASE CREDENTIALS BELOW ↓↓↓
   ====================================================================== */
const SUPABASE_URL = "PASTE_YOUR_SUPABASE_URL_HERE";
const SUPABASE_ANON_KEY = "PASTE_YOUR_SUPABASE_ANON_KEY_HERE";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth:{ persistSession:true, storage: window.localStorage, autoRefreshToken:true }
});

/* ---------------- Global state ---------------- */
let currentUser = null;        // auth user
let myProfile = null;          // profiles row
let myConvoys = [];            // saved_convoys joined with convoys
let activeConvoy = null;       // convoy row currently open
let activeMembership = null;   // my convoy_members row for active convoy
let members = {};              // user_id -> {profile, member row, location, online}
let map, myMarker, routeControl;
let markerLayer = {};
let watchId = null;
let lastSentAt = 0;
let lastPos = null;
let locChannel, memberChannel, speakChannel, signalChannel, presenceChannel, routeChannel;
let localStream = null;
let peers = {};                // user_id -> RTCPeerConnection
let audioEls = {};
let pttHeld = false;
let ads = [];

/* ---------------- utils ---------------- */
function $(id){ return document.getElementById(id); }
function show(id){ $(id).classList.remove('hidden'); }
function hide(id){ $(id).classList.add('hidden'); }
function toast(msg,ms=2600){
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  $('toast-root').appendChild(t); setTimeout(()=>t.remove(),ms);
}
function haversine(lat1,lon1,lat2,lon2){
  const R=6371000, toRad=d=>d*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLon=toRad(lon2-lon1);
  const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fmtDist(m){ if(m==null) return '—'; return m<1000? Math.round(m)+' m' : (m/1000).toFixed(1)+' km'; }
function fmtSpeed(mps){ if(mps==null||isNaN(mps)) return '0 km/h'; return Math.max(0,Math.round(mps*3.6))+' km/h'; }
function timeAgo(ts){
  if(!ts) return 'never';
  const s=Math.floor((Date.now()-new Date(ts).getTime())/1000);
  if(s<10) return 'just now';
  if(s<60) return s+'s ago';
  if(s<3600) return Math.floor(s/60)+'m ago';
  return Math.floor(s/3600)+'h ago';
}
function initials(name){ return (name||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function uuidShort(){ return Math.random().toString(36).slice(2,8); }

/* ---------------- THEME ---------------- */
function applyTheme(t){ document.body.setAttribute('data-theme',t); localStorage.setItem('ci_theme',t); }
function toggleTheme(){
  applyTheme(document.body.getAttribute('data-theme')==='dark'?'light':'dark');
}
applyTheme(localStorage.getItem('ci_theme')||'light');

/* ======================================================================
   AUTH
   ====================================================================== */
function switchAuthTab(tab){
  $('tab-login').classList.toggle('active',tab==='login');
  $('tab-signup').classList.toggle('active',tab==='signup');
  $('login-form').classList.toggle('hidden',tab!=='login');
  $('signup-form').classList.toggle('hidden',tab!=='signup');
}

async function doSignup(){
  const errEl=$('signup-err'); errEl.textContent='';
  const full_name=$('su-name').value.trim();
  const username=$('su-username').value.trim().toLowerCase().replace(/\s+/g,'_');
  const email=$('su-email').value.trim();
  const mobile=$('su-mobile').value.trim();
  const blood=$('su-blood').value;
  const pass=$('su-pass').value;
  if(!full_name||!username||!email||!mobile||!pass){ errEl.textContent='Please fill all fields.'; return; }
  if(pass.length<6){ errEl.textContent='Password must be at least 6 characters.'; return; }
  const {data,error}=await sb.auth.signUp({
    email, password:pass,
    options:{ data:{ full_name, username, mobile_number:mobile, blood_group:blood } }
  });
  if(error){ errEl.textContent=error.message; return; }
  if(data.user && !data.session){
    toast('Account created. Check your email to confirm, then log in.',5000);
    switchAuthTab('login');
    return;
  }
  await afterAuth();
}

async function doLogin(){
  const errEl=$('login-err'); errEl.textContent='';
  const email=$('li-email').value.trim(), pass=$('li-pass').value;
  if(!email||!pass){ errEl.textContent='Enter email and password.'; return; }
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){ errEl.textContent=error.message; return; }
  await afterAuth();
}

async function doLogout(){
  await leaveConvoyView(true);
  await sb.auth.signOut();
  currentUser=null; myProfile=null;
  hide('view-home'); hide('view-profile'); hide('view-admin'); hide('view-convoy');
  show('view-auth');
}

async function afterAuth(){
  const {data:{user}}=await sb.auth.getUser();
  currentUser=user;
  if(!currentUser){ toast('Login failed'); return; }
  const {data:profile,error}=await sb.from('profiles').select('*').eq('id',currentUser.id).single();
  if(error || !profile){ toast('Profile not ready yet, retrying…'); setTimeout(afterAuth,1200); return; }
  myProfile=profile;
  hide('view-auth');
  show('view-home');
  $('pf-location-toggle').checked = myProfile.location_enabled;
  $('admin-nav-btn').style.display = myProfile.is_admin ? '' : 'none';
  await loadAds();
  await loadMyConvoys();
}

/* Restore session on load */
(async function boot(){
  const {data:{session}} = await sb.auth.getSession();
  if(session){ await afterAuth(); } else { show('view-auth'); }
  sb.auth.onAuthStateChange((event)=>{
    if(event==='SIGNED_OUT'){ show('view-auth'); hide('view-home'); }
  });
  window.addEventListener('online', handleReconnect);
})();

/* ======================================================================
   HOME / CONVOY LIST (WhatsApp-style)
   ====================================================================== */
async function loadAds(){
  const {data}=await sb.from('ads').select('*').eq('active',true).order('created_at',{ascending:false});
  ads=data||[];
  const track=$('ads-track'); track.innerHTML='';
  ads.forEach(ad=>{
    const el=document.createElement(ad.link_url?'a':'div');
    el.className='ad-card';
    if(ad.link_url){ el.href=ad.link_url; el.target='_blank'; }
    el.innerHTML = (ad.media_type==='video'
      ? `<video src="${ad.media_url}" muted loop autoplay playsinline></video>`
      : `<img src="${ad.media_url}" alt="${ad.title}">`)
      + `<span class="ad-tag">Ad</span><div class="ad-title">${ad.title}</div>`;
    track.appendChild(el);
  });
}

async function loadMyConvoys(){
  const {data:saved}=await sb.from('saved_convoys').select('convoy_id, convoys(*)').eq('user_id',currentUser.id).order('saved_at',{ascending:false});
  myConvoys = (saved||[]).filter(s=>s.convoys).map(s=>s.convoys);
  const {data:memberRows}=await sb.from('convoy_members').select('convoy_id').eq('user_id',currentUser.id);
  const activeSet = new Set((memberRows||[]).map(m=>m.convoy_id));

  const list=$('convoy-list'); list.innerHTML='';
  if(myConvoys.length===0){ show('empty-state'); } else { hide('empty-state'); }
  myConvoys.forEach(c=>{
    const row=document.createElement('div'); row.className='convoy-row';

async function createConvoy(){

  if(!name){ $('cj-err').textContent='Enter a convoy name.'; return; }
  const {data:codeData}=await sb.rpc('generate_convoy_code');
  const code = codeData || uuidShort().toUpperCase();
  const {data:convoy,error}=await sb.from('convoys').insert({name, code, creator_id:currentUser.id}).select().single();
  if(error){ $('cj-err').textContent=error.message; return; }
  await sb.from('convoy_members').insert({convoy_id:convoy.id, user_id:currentUser.id, role:'owner', can_manage_route:true});
  await sb.from('saved_convoys').insert({user_id:currentUser.id, convoy_id:convoy.id});
  closeModal();

  enterConvoy(convoy);

async function joinConvoy(){
  const code=$('cj-code').value.trim().toUpperCase();
  if(!code){ $('cj-err').textContent='Enter a convoy code.'; return; }
  const {data:convoy,error}=await sb.from('convoys').select('*').eq('code',code).single();
  if(error||!convoy){ $('cj-err').textContent='Convoy not found.'; return; }
  const {error:joinErr}=await sb.from('convoy_members').upsert(
    {convoy_id:convoy.id, user_id:currentUser.id, role:'member'}, {onConflict:'convoy_id,user_id', ignoreDuplicates:false}

  if(joinErr){ $('cj-err').textContent=joinErr.message; return; }
  await sb.from('saved_convoys').upsert({user_id:currentUser.id, convoy_id:convoy.id}, {onConflict:'user_id,convoy_id'});
  closeModal();
  await loadMyConvoys();

  }).addTo(map);

async function loadMembers(){
  const {data:rows}=await sb.from('convoy_members').select('*, profiles(*)').eq('convoy_id',activeConvoy.id);
  members={};

    members[r.user_id]={ member:r, profile:r.profiles, location:null, online:false };

async function loadRoute(){

function renderMemberList(){
  const list=$('member-list'); list.innerHTML='';
  const isOwnerOrAdmin = activeMembership && (activeMembership.role==='owner'||activeMembership.role==='admin');
  Object.values(members).sort((a,b)=>(a.profile.username||'').localeCompare(b.profile.username||'')).forEach(m=>{
    const dist = (m.location && lastPos) ? haversine(lastPos.lat,lastPos.lng,m.location.lat,m.location.lng) : null;
    const isMe = m.profile.id===currentUser.id;
    const online = m.online || (m.location && (Date.now()-new Date(m.location.updated_at).getTime() < 25000));
    const div=document.createElement('div');
    div.className='member-item'+(m.speaking?' speaking':'');
    div.id='member-'+m.profile.id;
    div.innerHTML=`
      <div class="status-dot ${online?'online':''}"></div>
      <div class="m-info">
        <div class="m-name">@${m.profile.username}${isMe?' (you)':''} ${m.member.role!=='member'?'<span class="badge">'+m.member.role.toUpperCase()+'</span>':''}</div>
        <div class="m-meta">Speed: ${fmtSpeed(m.location? m.location.speed: null)} • Dist: ${isMe?'0 m':fmtDist(dist)} • ${timeAgo(m.location?m.location.updated_at:null)}</div>
      </div>
      ${isOwnerOrAdmin && !isMe ? `
        <button class="mini-btn" onclick="toggleRouteAccess('${m.profile.id}', ${!m.member.can_manage_route})">${m.member.can_manage_route?'Revoke Route':'Grant Route'}</button>
        <button class="mini-btn" onclick="removeMember('${m.profile.id}')">Remove</button>

function renderMarkers(){
  Object.values(members).forEach(m=>{
    if(!m.location) return;
    const isMe = m.profile.id===currentUser.id;
    const color = isMe ? '#2563eb' : '#16a34a';
    const icon = L.divIcon({
      className:'', html:`<div style="background:${color};color:#fff;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4);transform:rotate(${m.location.heading||0}deg);">${initials(m.profile.username).slice(0,2)}</div>`,
      iconSize:[34,34], iconAnchor:[17,17]
    });
    if(markerLayer[m.profile.id]){
      markerLayer[m.profile.id].setLatLng([m.location.lat,m.location.lng]).setIcon(icon);
    } else {
      markerLayer[m.profile.id]=L.marker([m.location.lat,m.location.lng],{icon}).addTo(map)
        .bindPopup(`<b>@${m.profile.profile? '' : m.profile.username}</b>`);
      markerLayer[m.profile.id].bindPopup(()=> `<b>@${m.profile.username}</b><br>${fmtSpeed(m.location.speed)}<br>${timeAgo(m.location.updated_at)}`);
    }
  });
  const pts=Object.values(members).filter(m=>m.location).map(m=>[m.location.lat,m.location.lng]);
  if(pts.length && !map._userMoved){ map.fitBounds(pts,{maxZoom:15,padding:[40,40]}); }
}
// track manual map interaction so we stop auto-fitting after user pans/zooms
function markUserMoved(){ map._userMoved=true; }

/* ======================================================================
   REALTIME SUBSCRIPTIONS (locations, members, speaking, route, presence)
   ====================================================================== */
function subscribeConvoyRealtime(){
  cleanupChannels();
  const cid=activeConvoy.id;

  locChannel = sb.channel('locations-'+cid)
    .on('postgres_changes',{event:'*',schema:'public',table:'locations',filter:'convoy_id=eq.'+cid},payload=>{
      const row=payload.new;
      if(row && members[row.user_id]){ members[row.user_id].location=row; renderMarkers(); renderMemberList(); }
    }).subscribe();

  memberChannel = sb.channel('members-'+cid)
    .on('postgres_changes',{event:'*',schema:'public',table:'convoy_members',filter:'convoy_id=eq.'+cid},async()=>{
      await loadMembers();
    }).subscribe();

  speakChannel = sb.channel('speak-'+cid)
    .on('postgres_changes',{event:'*',schema:'public',table:'speaking_status',filter:'convoy_id=eq.'+cid},payload=>{
      const row=payload.new;
      if(row && members[row.user_id]){
        members[row.user_id].speaking=row.is_speaking;
        renderMemberList();
      }
    }).subscribe();

  routeChannel = sb.channel('route-'+cid)
    .on('postgres_changes',{event:'*',schema:'public',table:'route_points',filter:'convoy_id=eq.'+cid},payload=>{
      if(payload.eventType==='DELETE'){ if(routeControl) map.removeControl(routeControl); return; }
      const r=payload.new;
      drawRoute(r.origin_lat,r.origin_lng,r.dest_lat,r.dest_lng,r.dest_label);
    }).subscribe();

  // Presence + WebRTC signaling channel (ephemeral, not persisted)
  presenceChannel = sb.channel('presence-'+cid,{ config:{ presence:{ key:currentUser.id } } });
  presenceChannel
    .on('presence',{event:'sync'},()=>{
      const state=presenceChannel.presenceState();
      Object.keys(members).forEach(uid=> members[uid].online = !!state[uid]);
      renderMemberList();
    })
    .on('presence',{event:'join'},({key})=>{
      if(key!==currentUser.id) connectToPeer(key);
    })
    .on('broadcast',{event:'signal'},({payload})=> handleSignal(payload))
    .subscribe(async(status)=>{
      if(status==='SUBSCRIBED'){
        await presenceChannel.track({user_id:currentUser.id, username:myProfile.username, at:Date.now()});
      }
    });
  signalChannel = presenceChannel;
}

function cleanupChannels(){
  [locChannel,memberChannel,speakChannel,routeChannel,presenceChannel].forEach(ch=>{ if(ch) sb.removeChannel(ch); });
  locChannel=memberChannel=speakChannel=routeChannel=presenceChannel=null;
  Object.values(peers).forEach(pc=>pc.close()); peers={};
  Object.values(audioEls).forEach(a=>a.remove()); audioEls={};
}

async function handleReconnect(){
  if(activeConvoy){
    subscribeConvoyRealtime();
    if(!watchId) startLocationTracking();
  }
}

/* ======================================================================
   GPS TRACKING (battery-efficient: time+distance throttled)
   ====================================================================== */
function startLocationTracking(){
  if(!navigator.geolocation){ toast('Geolocation not supported'); return; }
  if(!myProfile.location_enabled){ toast('Location sharing is OFF in your profile'); return; }
  if(watchId) navigator.geolocation.clearWatch(watchId);
  watchId = navigator.geolocation.watchPosition(onPosition, onPosError, {
    enableHighAccuracy:true, maximumAge:2000, timeout:15000
  });
}
function stopLocationTracking(){ if(watchId){ navigator.geolocation.clearWatch(watchId); watchId=null; } }

async function onPosition(pos){
  const {latitude:lat, longitude:lng, heading, speed, accuracy} = pos.coords;
  const now=Date.now();
  let movedEnough = true;
  if(lastPos){
    const d=haversine(lastPos.lat,lastPos.lng,lat,lng);
    movedEnough = d>3; // only push if moved >3m, saves battery/network
  }
  lastPos={lat,lng};
  if(myMarker){ myMarker.setLatLng([lat,lng]); } 
  if(!activeConvoy || !myProfile.location_enabled) return;
  if(!activeMembership || activeMembership.share_location===false){ renderMemberList(); return; }
  if(now-lastSentAt < 3000 && movedEnough===false) { renderMemberList(); return; }
  lastSentAt=now;
  await sb.from('locations').upsert({
    user_id:currentUser.id, convoy_id:activeConvoy.id, lat, lng,
    heading: heading==null?null:heading, speed: speed==null?null:speed, accuracy,
    updated_at:new Date().toISOString()
  },{onConflict:'user_id'});
  renderMemberList();
}
function onPosError(err){ toast('Location error: '+err.message); }

/* ======================================================================

   ====================================================================== */
async function searchDestination(){
  const q=$('route-search-input').value.trim();
  if(!q){ toast('Enter a destination'); return; }
  if(!lastPos){ toast('Waiting for your location…'); return; }
  try{
    const res=await fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(q));
    const data=await res.json();
    if(!data.length){ toast('Place not found'); return; }
    const dest=data[0];
    await sb.from('route_points').upsert({
      convoy_id:activeConvoy.id, origin_lat:lastPos.lat, origin_lng:lastPos.lng,
      origin_label:'Convoy Start', dest_lat:parseFloat(dest.lat), dest_lng:parseFloat(dest.lon),
      dest_label:dest.display_name.split(',')[0], set_by:currentUser.id, updated_at:new Date().toISOString()
    },{onConflict:'convoy_id'});
    drawRoute(lastPos.lat,lastPos.lng,parseFloat(dest.lat),parseFloat(dest.lon),dest.display_name.split(',')[0]);
  }catch(e){ toast('Search failed'); }
}
function drawRoute(oLat,oLng,dLat,dLng,label){
  if(routeControl){ map.removeControl(routeControl); routeControl=null; }
  routeControl = L.Routing.control({
    waypoints:[L.latLng(oLat,oLng), L.latLng(dLat,dLng)],
    routeWhileDragging:false, addWaypoints:false, draggableWaypoints:false,
    show:false, createMarker:(i,wp)=> L.marker(wp.latLng).bindPopup(i===0?'Start':(label||'Destination'))
  }).addTo(map);
}
async function clearRoute(){
  await sb.from('route_points').delete().eq('convoy_id',activeConvoy.id);
  if(routeControl){ map.removeControl(routeControl); routeControl=null; }
}

/* ======================================================================
   PUSH-TO-TALK (WebRTC mesh via Supabase Realtime Broadcast signaling)
   ====================================================================== */
const RTC_CONFIG = { iceServers:[{urls:'stun:stun.l.google.com:19302'}] };

async function initPTT(){
  const btn=$('ptt-btn');
  btn.disabled=false;
  updatePTTStatus();
  try{
    localStream = await navigator.mediaDevices.getUserMedia({audio:true});
    localStream.getAudioTracks().forEach(t=> t.enabled = (activeConvoy.ptt_enabled===false));
  }catch(e){
    toast('Microphone permission denied');
    btn.disabled=true;
    return;
  }

  const start=(e)=>{ e.preventDefault(); startTalking(); };
  const stop=(e)=>{ e.preventDefault(); stopTalking(); };
  btn.onmousedown=start; btn.ontouchstart=start;
  btn.onmouseup=stop; btn.ontouchend=stop; btn.onmouseleave=stop; btn.ontouchcancel=stop;
}

function updatePTTStatus(){
  const btn=$('ptt-btn'); const st=$('ptt-status');
  if(activeConvoy.is_muted){ st.textContent='Convoy is silenced by admin'; btn.disabled=true; return; }
  btn.disabled=false;
  if(activeConvoy.ptt_enabled===false){ st.textContent='Open mic mode — everyone can talk freely'; btn.textContent='MIC\nOPEN'; }
  else { st.textContent='Hold to talk'; btn.textContent='HOLD\nTO TALK'; }
}

async function startTalking(){
  if(activeConvoy.is_muted || activeConvoy.ptt_enabled===false) return;
  pttHeld=true;
  $('ptt-btn').classList.add('active');
  localStream.getAudioTracks().forEach(t=>t.enabled=true);
  await setSpeaking(true);
}
async function stopTalking(){
  if(activeConvoy.ptt_enabled===false) return;
  pttHeld=false;
  $('ptt-btn').classList.remove('active');
  localStream.getAudioTracks().forEach(t=>t.enabled=false);
  await setSpeaking(false);
}
async function setSpeaking(val){
  await sb.from('speaking_status').upsert({
    user_id:currentUser.id, convoy_id:activeConvoy.id, is_speaking: activeConvoy.is_muted? false: val, updated_at:new Date().toISOString()
  },{onConflict:'user_id'});
}

/* --- WebRTC signaling helpers --- */
function sendSignal(to,data){
  signalChannel.send({type:'broadcast',event:'signal',payload:{to,from:currentUser.id,...data}});
}
async function connectToPeer(otherId){
  if(peers[otherId] || otherId===currentUser.id) return;
  const polite = currentUser.id < otherId; // lower id = initiator
  const pc = createPeerConnection(otherId);
  peers[otherId]=pc;
  if(polite){
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    sendSignal(otherId,{sdp:pc.localDescription});
  }
}
function createPeerConnection(otherId){
  const pc = new RTCPeerConnection(RTC_CONFIG);
  if(localStream) localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  pc.onicecandidate = e=>{ if(e.candidate) sendSignal(otherId,{candidate:e.candidate}); };
  pc.ontrack = e=>{
    let audio = audioEls[otherId];
    if(!audio){ audio=document.createElement('audio'); audio.autoplay=true; audio.playsInline=true; document.body.appendChild(audio); audioEls[otherId]=audio; }
    audio.srcObject = e.streams[0];
  };
  return pc;
}
async function handleSignal(payload){
  if(payload.to!==currentUser.id) return;
  const otherId=payload.from;
  let pc=peers[otherId];
  if(!pc){ pc=createPeerConnection(otherId); peers[otherId]=pc; }
  if(payload.sdp){
    await pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
    if(payload.sdp.type==='offer'){
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      sendSignal(otherId,{sdp:pc.localDescription});
    }
  } else if(payload.candidate){
    try{ await pc.addIceCandidate(new RTCIceCandidate(payload.candidate)); }catch(e){}
  }
}

/* ======================================================================
   LEAVE CONVOY (compulsory on exit — membership removed, saved kept)
   ====================================================================== */
async function leaveConvoyView(skipConfirm){
  if(!activeConvoy) { hide('view-convoy'); show('view-home'); return; }
  if(!skipConfirm && !confirm('Leaving will remove you from the live convoy (you can rejoin anytime from your list). Continue?')) return;

  stopLocationTracking();
  if(localStream){ localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
  cleanupChannels();
  await sb.from('locations').delete().eq('user_id',currentUser.id).eq('convoy_id',activeConvoy.id);
  await sb.from('speaking_status').delete().eq('user_id',currentUser.id).eq('convoy_id',activeConvoy.id);
  await sb.from('convoy_members').delete().eq('convoy_id',activeConvoy.id).eq('user_id',currentUser.id);

  activeConvoy=null; activeMembership=null; members={};
  if(map){ map.remove(); map=null; }
  hide('view-convoy'); show('view-home');
  await loadMyConvoys();
}

async function saveProfile(){
  const updates={
    full_name:$('pf-name').value.trim(), username:$('pf-username').value.trim().toLowerCase(),
    mobile_number:$('pf-mobile').value.trim(), blood_group:$('pf-blood').value
  };
  const {error}=await sb.from('profiles').update(updates).eq('id',currentUser.id);
  if(error){ toast('Error: '+error.message); return; }
  Object.assign(myProfile,updates);
  toast('Profile saved');
}
async function toggleGlobalLocation(){
  const val=$('pf-location-toggle').checked;
  await sb.from('profiles').update({location_enabled:val}).eq('id',currentUser.id);
  myProfile.location_enabled=val;
  if(val){ startLocationTracking(); } else { stopLocationTracking(); if(activeConvoy) await sb.from('locations').delete().eq('user_id',currentUser.id).eq('convoy_id',activeConvoy.id); }
  toast(val?'Location sharing enabled':'Location sharing disabled everywhere');
}

/* ======================================================================
   ADMIN (Ads) — only visible to profiles.is_admin
   ====================================================================== */
function openAdmin(){
  if(!myProfile.is_admin){ toast('Admin access only'); return; }
  hide('view-home'); show('view-admin'); loadAdManageList();
}
function closeAdmin(){ hide('view-admin'); show('view-home'); }
async function createAd(){
  const title=$('ad-title').value.trim(), media_url=$('ad-media').value.trim();
  const media_type=$('ad-type').value, link_url=$('ad-link').value.trim()||null;
  if(!title||!media_url){ toast('Title and media URL required'); return; }
  const {error}=await sb.from('ads').insert({title,media_url,media_type,link_url,active:true,created_by:currentUser.id});
  if(error){ toast(error.message); return; }
  $('ad-title').value=''; $('ad-media').value=''; $('ad-link').value='';
  toast('Ad published'); loadAdManageList(); loadAds();
}
async function loadAdManageList(){
  const {data}=await sb.from('ads').select('*').order('created_at',{ascending:false});
  const list=$('ad-manage-list'); list.innerHTML='';
  (data||[]).forEach(ad=>{
    const div=document.createElement('div'); div.className='card';
    div.innerHTML=`<b>${ad.title}</b> <span class="badge">${ad.active?'ACTIVE':'HIDDEN'}</span>
      <p class="muted" style="word-break:break-all;">${ad.media_url}</p>
      <div class="row">
        <button class="btn small secondary" onclick="toggleAd('${ad.id}',${!ad.active})">${ad.active?'Hide':'Show'}</button>
        <button class="btn small danger" onclick="deleteAd('${ad.id}')">Delete</button>
      </div>`;
    list.appendChild(div);
  });
}
async function toggleAd(id,val){ await sb.from('ads').update({active:val}).eq('id',id); loadAdManageList(); loadAds(); }
async function deleteAd(id){ if(!confirm('Delete this ad?'))return; await sb.from('ads').delete().eq('id',id); loadAdManageList(); loadAds(); }

/* ======================================================================
   MODAL HELPER
   ====================================================================== */
function renderModal(innerHtml){
  $('modal-root').innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${innerHtml}</div></div>`;
}
function closeModal(){ $('modal-root').innerHTML=''; }

/* ======================================================================
   PWA — manifest via data URI + best-effort service worker
   ====================================================================== */
(function setupPWA(){
  const manifest = {
    name:"Convoy Intercom", short_name:"Convoy", start_url:".", display:"standalone",
    background_color:"#0f172a", theme_color:"#0f172a",
    icons:[{src:"https://cdn-icons-png.flaticon.com/512/2554/2554936.png", sizes:"512x512", type:"image/png"}]
  };
  const link=document.createElement('link'); link.rel='manifest';
  link.href='data:application/manifest+json,'+encodeURIComponent(JSON.stringify(manifest));
  document.head.appendChild(link);

  if('serviceWorker' in navigator){
    const swCode = `
      self.addEventListener('install',e=>self.skipWaiting());
      self.addEventListener('activate',e=>self.clients.claim());
      self.addEventListener('fetch',e=>{});
    `;
    try{
      const blob=new Blob([swCode],{type:'application/javascript'});
      const swUrl=URL.createObjectURL(blob);
      navigator.serviceWorker.register(swUrl).catch(()=>{ /* offline caching unavailable on this host; app still works online */ });
    }catch(e){ /* ignore - non-critical */ }
  }
})();

/* attach map interaction listeners once map exists (delegated) */
document.addEventListener('DOMContentLoaded',()=>{
  const observer=new MutationObserver(()=>{ if(map){ map.on('dragstart zoomstart',markUserMoved); } });
  observer.observe(document.body,{childList:true,subtree:true});
});
